<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

#login, #app{
  padding:20px;
}

#app{display:none;}

input,button{
  padding:10px;
  margin:5px;
}

button{
  background:#38bdf8;
  border:none;
  border-radius:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

canvas{
  background:#1e293b;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <h2>Dashboard</h2>

  <div class="grid">
    <div class="card">Sales<br><b id="sales">£0</b></div>
    <div class="card">Products<br><b id="products">0</b></div>
    <div class="card">Top<br><b id="top">-</b></div>
  </div>

  <div style="margin-top:10px;">
    <input id="startDate" type="date">
    <input id="endDate" type="date">
    <button onclick="setRange('apply')">Apply</button>
    <button onclick="setRange('7')">7D</button>
    <button onclick="setRange('30')">30D</button>
  </div>

  <canvas id="barChart"></canvas>
  <canvas id="salesChart"></canvas>

  <h3>All Products</h3>
  <table id="productTable" width="100%"></table>

</div>

<script>

const App = {

  state:{
    RAW:{},
    FILTERED:{},
    barChart:null,
    salesChart:null
  },

  config:{
    URL:"https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    password:"1234"
  },

  login(){
    const p=document.getElementById("pass");

    if(!p || p.value!==this.config.password){
      alert("Wrong password");
      return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    this.load();
  },

  async load(){
    const res=await fetch(this.config.URL);
    const data=await res.json();

    this.state.RAW=data;
    this.state.FILTERED=data;

    this.draw(data);
  },

  setRange(type){

    const now=new Date();
    let start=new Date();

    if(type==="7") start.setDate(now.getDate()-7);
    if(type==="30") start.setDate(now.getDate()-30);

    document.getElementById("startDate").value=start.toISOString().split("T")[0];
    document.getElementById("endDate").value=now.toISOString().split("T")[0];

    this.applyRange();
  },

  applyRange(){

    const s=new Date(document.getElementById("startDate").value).getTime();
    const e=new Date(document.getElementById("endDate").value).getTime();

    const out={};

    for(const d in this.state.RAW){
      const t=new Date(d).getTime();
      if(t>=s && t<=e) out[d]=this.state.RAW[d];
    }

    this.state.FILTERED=out;
    this.draw(out);
  },

  draw(data){

    let pt={}, dt={}, total=0;
    const dates=Object.keys(data).sort();

    for(const d of dates){

      dt[d]=0;

      for(const p in data[d]){
        const v=+data[d][p]||0;

        pt[p]=(pt[p]||0)+v;
        dt[d]+=v;
        total+=v;
      }
    }

    const sorted=Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5=sorted.slice(0,5);

    /* HEADER */
    document.getElementById("sales").innerText="£"+total.toFixed(2);
    document.getElementById("products").innerText=sorted.length;
    document.getElementById("top").innerText=top5[0]||"-";

    /* FULL PRODUCT TABLE */
    document.getElementById("productTable").innerHTML =
      sorted.map(p=>
        `<tr>
          <td>${p}</td>
          <td style="text-align:right">£${pt[p].toFixed(2)}</td>
        </tr>`
      ).join("");

    /* STACKED TOP 5 PER DAY (FIX YOU LOST THIS) */
    if(this.state.barChart) this.state.barChart.destroy();

    this.state.barChart=new Chart(document.getElementById("barChart"),{
      type:"bar",
      data:{
        labels:dates,
        datasets:top5.map(p=>({
          label:p,
          data:dates.map(d=>data[d]?.[p]||0),
          stack:"stack1"
        }))
      },
      options:{
        responsive:true,
        scales:{
          x:{stacked:true},
          y:{stacked:true}
        }
      }
    });

    /* DAILY TOTAL SALES */
    if(this.state.salesChart) this.state.salesChart.destroy();

    this.state.salesChart=new Chart(document.getElementById("salesChart"),{
      type:"bar",
      data:{
        labels:dates,
        datasets:[{
          label:"Sales (£)",
          data:dates.map(d=>dt[d]||0)
        }]
      }
    });
  }

};

/* GLOBAL */
function login(){App.login();}
function setRange(t){App.setRange(t);}

</script>

</body>
</html>
