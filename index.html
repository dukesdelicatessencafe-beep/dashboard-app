<script>

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let RAW = {};
let barChart = null;
let salesChart = null;

/* LOGIN */
function login(){

  const passEl = document.getElementById("pass");
  const loginEl = document.getElementById("login");
  const appEl = document.getElementById("app");

  if(!passEl || !loginEl || !appEl){
    alert("UI not loaded correctly");
    return;
  }

  if(passEl.value === "1234"){
    loginEl.style.display = "none";
    appEl.style.display = "block";
    load();
  } else {
    alert("Wrong password");
  }
}

/* LOAD DATA (SAFE) */
async function load(){

  try{

    const res = await fetch(URL);
    const text = await res.text();

    if(!text || text.includes("<!DOCTYPE")){
      throw new Error("API returned HTML");
    }

    const data = JSON.parse(text);

    RAW = data;
    draw(RAW);

  } catch(e){
    console.error("LOAD ERROR:", e);
    alert("Load failed — API issue");
  }
}

/* DRAW DASHBOARD */
function draw(data){

  let pt = {};
  let dt = {};
  let total = 0;

  let dates = Object.keys(data || {}).sort();

  for(let d of dates){

    let day = data[d] || {};
    dt[d] = 0;

    for(let p in day){

      let v = Number(day[p] || 0);

      pt[p] = (pt[p] || 0) + v;
      dt[d] += v;
      total += v;
    }
  }

  let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
  let top5 = sorted.slice(0,5);

  document.getElementById("sales").innerText = "£" + total.toFixed(2);
  document.getElementById("products").innerText = sorted.length;
  document.getElementById("top").innerText = top5[0] || "-";

  // AI INSIGHTS
  let avg = total / (dates.length || 1);
  let anomalies = dates.filter(d => dt[d] > avg * 1.5);

  document.getElementById("insights").innerHTML =
    "🏆 Top Products<br>" +
    top5.map(p => "• " + p + " (£" + pt[p].toFixed(2) + ")").join("<br>") +
    "<br><br>⚠️ High Sales Days<br>" +
    (anomalies.length ? anomalies.join("<br>") : "None");

  const barCanvas = document.getElementById("barChart");
  const salesCanvas = document.getElementById("salesChart");

  if(barChart) barChart.destroy();

  barChart = new Chart(barCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d]?.[p] || 0),
        stack:"stack1"
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      }
    }
  });

  if(salesChart) salesChart.destroy();

  salesChart = new Chart(salesCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales (£)",
        data:dates.map(d=>dt[d] || 0),
        backgroundColor:"#38bdf8"
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

  document.getElementById("table").innerHTML =
    sorted.map(p =>
      `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`
    ).join("");
}

/* TAB SWITCH */
function switchTab(n,el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* DATE PRESETS */
function setRange(type){

  let end = new Date();
  let start = new Date();

  if(type==="today"){
    start.setHours(0,0,0,0);
  }

  if(type==="7"){
    start.setDate(end.getDate()-7);
  }

  if(type==="30"){
    start.setDate(end.getDate()-30);
  }

  document.getElementById("startDate").value =
    start.toISOString().split("T")[0];

  document.getElementById("endDate").value =
    end.toISOString().split("T")[0];

  applyFilter();
}

/* FILTER */
function applyFilter(){

  let s = new Date(document.getElementById("startDate").value).getTime();
  let e = new Date(document.getElementById("endDate").value).getTime();

  let out = {};

  for(let d in RAW){
    let t = new Date(d).getTime();
    if(t >= s && t <= e){
      out[d] = RAW[d];
    }
  }

  draw(out);
}

/* SWIPE */
let startX = 0;

const container = document.getElementById("container");

container.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

container.addEventListener("touchend", e=>{
  let diff = e.changedTouches[0].clientX - startX;

  if(diff > 80){
    switchTab(1, document.querySelectorAll(".nav div")[0]);
  }

  if(diff < -80){
    switchTab(3, document.querySelectorAll(".nav div")[2]);
  }
});

/* PULL TO REFRESH */
let pulling = false;

container.addEventListener("touchmove", e=>{
  if(container.scrollTop === 0 && e.touches[0].clientY > 80){
    pulling = true;
  }
});

container.addEventListener("touchend", ()=>{
  if(pulling){
    load();
  }
  pulling = false;
});

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

</script>
