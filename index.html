<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:999;
  pointer-events:none;
}

.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input,button{
  padding:10px;
  margin:5px;
}

/* APP */
.wrap{
  overflow:hidden;
}

/* SLIDER */
.slider{
  display:flex;
  width:300vw;
  height:100vh;
  touch-action:pan-y;
}

.section{
  width:100vw;
  flex-shrink:0;
  padding:12px;
  box-sizing:border-box;
}

/* TILES */
.tiles{
  display:flex;
  gap:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  padding:10px;
  text-align:center;
}

.nav .active{
  background:#38bdf8;
}

/* TABLE */
table{width:100%;}
td{
  padding:6px;
  border-bottom:1px solid #334155;
}

/* CHART */
.chartBox{
  height:220px;
  margin-top:10px;
}

canvas{
  width:100% !important;
  height:220px !important;
}

</style>
</head>

<body>

<div id="splash"><div class="loader"></div></div>

<div id="login">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<div id="app" style="display:none;" class="wrap">

<input type="date" id="start">
<input type="date" id="end">
<button onclick="load()">Load</button>

<div id="slider" class="slider">

  <!-- TAB 1 -->
  <div class="section">
    <div class="tiles">
      <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
      <div class="tile"><div>Products</div><div id="orders">0</div></div>
      <div class="tile"><div>Top</div><div id="top">-</div></div>
    </div>
    <div class="chartBox"><canvas id="barChart"></canvas></div>
  </div>

  <!-- TAB 2 -->
  <div class="section">
    <div id="tableArea"></div>
  </div>

  <!-- TAB 3 -->
  <div class="section">
    <div class="chartBox"><canvas id="lineChart"></canvas></div>
  </div>

</div>
</div>

<div class="nav">
  <div onclick="goTo(0,this)" class="active">📊</div>
  <div onclick="goTo(1,this)">📦</div>
  <div onclick="goTo(2,this)">📈</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let barChart, lineChart;
let currentIndex = 0;

const slider = document.getElementById("slider");

/* ======================
   SWIPE SYSTEM
====================== */
let startX = 0;
let currentX = 0;
let isDragging = false;

slider.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  isDragging = true;
});

slider.addEventListener("touchmove", e=>{
  if(!isDragging) return;

  currentX = e.touches[0].clientX;
  let diff = currentX - startX;

  slider.style.transform =
    `translateX(${-(currentIndex * window.innerWidth) + diff}px)`;
});

slider.addEventListener("touchend", ()=>{
  isDragging = false;

  let diff = currentX - startX;

  if(diff < -50 && currentIndex < 2) currentIndex++;
  if(diff > 50 && currentIndex > 0) currentIndex--;

  updateSlide();
});
