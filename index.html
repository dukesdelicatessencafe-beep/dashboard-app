<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="./icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#app{
  display:none;
}

.wrap{
  padding:12px;
  padding-bottom:70px;
}

.dateBar{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

.dateBar button{
  padding:8px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
}

.presetRow{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.presetBtn{
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:12px;
}

.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.chartBox{
  width:100%;
  height:260px;
}

canvas{
  width:100% !important;
  height:260px !important;
}

table{
  width:100%;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
  height:55px;
}

.nav div{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav .active{
  background:#38bdf8;
}

.tab{display:none}
.tab.active{display:block}

#insights{
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

<img src="./icon.png?v=4"
style="width:100px;height:100px;border-radius:20px;margin-bottom:15px;background:#1e293b;">

<h2>Sales Dashboard</h2>

<input id="pass" type="password" placeholder="Password"
style="padding:10px;border-radius:8px;border:none;margin-bottom:10px;width:200px;">

<button onclick="login()"
style="padding:10px;border:none;border-radius:8px;background:#38bdf8;">
Login
</button>

</div>

<!-- APP -->
<div id="app">

<div class="wrap">

<!-- TAB 1 -->
<div id="tab1" class="tab active">

<div class="dateBar">
<input type="date" id="startDate">
<input type="date" id="endDate">
<button onclick="applyFilter()">Go</button>
</div>

<div class="presetRow">
<button class="presetBtn" onclick="setRange('7')">7 Days</button>
<button class="presetBtn" onclick="setRange('30')">Month</button>
</div>

<div class="tiles">
<div class="tile">Sales<br><b id="sales">£0</b></div>
<div class="tile">Products<br><b id="products">0</b></div>
<div class="tile">Top<br><b id="top">-</b></div>
</div>

<div id="insights"></div>

<div class="chartBox">
<canvas id="barChart"></canvas>
</div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
<table id="table"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
<div class="chartBox">
<canvas id="lineChart"></canvas>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="switchTab(1,this)" class="active">📊</div>
<div onclick="switchTab(2,this)">📦</div>
<div onclick="switchTab(3,this)">📈</div>
</div>

</div>

<script>

/* YOUR REAL URL */
const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let RAW = {};
let barChart, lineChart;

/* LOGIN */
function login(){
  const pass = document.getElementById("pass").value;

  if(pass === "1234"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("Wrong password");
  }
}

/* LOAD DATA */
async function load(){
  try {
    let res = await fetch(URL);
    let text = await res.text();

    console.log("RAW RESPONSE:", text);

    RAW = JSON.parse(text);
    draw(RAW);

  } catch(err){
    console.error("LOAD ERROR:", err);
    alert("Failed to load data");
  }
}

/* FILTER */
function applyFilter(){

  let s = new Date(startDate.value).getTime();
  let e = new Date(endDate.value).getTime();

  if(!s || !e) return draw(RAW);

  let out = {};

  for(let d in RAW){
    let t = new Date(d).getTime();
    if(t >= s && t <= e) out[d] = RAW[d];
  }

  draw(out);
}

/* RANGE */
function setRange(days){

  let e = new Date();
  let s = new Date();

  if(days === "7") s.setDate(e.getDate()-7);
  if(days === "30") s.setDate(e.getDate()-30);

  startDate.value = format(s);
  endDate.value = format(e);

  applyFilter();
}

function format(d){
  return d.toISOString().split("T")[0];
}

/* DRAW */
function draw(data){

  if(!data || Object.keys(data).length === 0) return;

  let pt = {}, dt = {}, total = 0;
  let dates = Object.keys(data).sort();

  for(let d of dates){
    dt[d] = 0;

    for(let p in data[d]){
      let v = +data[d][p] || 0;
      pt[p] = (pt[p] || 0) + v;
      dt[d] += v;
      total += v;
    }
  }

  let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
  let top5 = sorted.slice(0,5);

  document.getElementById("sales").innerText = "£" + total.toFixed(2);
  document.getElementById("products").innerText = sorted.length;
  document.getElementById("top").innerText = top5[0] || "-";

  document.getElementById("insights").innerHTML =
    "🏆 Top Products<br>" +
    top5.map(p => `• ${p} (£${pt[p].toFixed(2)})`).join("<br>");

  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: dates,
      datasets: top5.map(p => ({
        label: p,
        data: dates.map(d => data[d][p] || 0),
        stack: "s"
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true }
      }
    }
  });

  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: "Sales",
        data: dates.map(d => dt[d])
      }]
    }
  });

  document.getElementById("table").innerHTML =
    sorted.map(p => `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");
}

/* TABS */
function switchTab(n, el){

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

</script>

</body>
</html>
