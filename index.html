<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.wrap{
  padding:12px;
  padding-bottom:70px;
}

/* DATE AREA */
.dateBar{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

.dateBar button{
  padding:8px 10px;
  border-radius:8px;
  border:none;
  background:#38bdf8;
  color:#000;
  font-weight:bold;
}

/* PRESETS */
.presetRow{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.presetBtn{
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:12px;
}

/* TABS */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#1e293b;
  height:55px;
}

.nav div{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.nav .active{
  background:#38bdf8;
}

/* TILES */
.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
}

/* CHARTS */
.chartBox{
  width:100%;
  height:260px;
}

canvas{
  width:100% !important;
  height:260px !important;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
  font-size:14px;
}

/* PULL REFRESH */
#pull{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  text-align:center;
  color:#38bdf8;
  font-size:14px;
  z-index:999;
}
</style>

</head>

<body>

<div id="pull">↓ Pull to refresh</div>

<div class="wrap">

<!-- TAB 1 -->
<div id="tab1" class="tab active">

  <!-- DATE RANGE -->
  <div class="dateBar">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="applyFilter()">Go</button>
  </div>

  <!-- PRESETS -->
  <div class="presetRow">
    <button class="presetBtn" onclick="setRange('today')">Today</button>
    <button class="presetBtn" onclick="setRange('7')">7 Days</button>
    <button class="presetBtn" onclick="setRange('30')">Month</button>
  </div>

  <!-- SUMMARY -->
  <div class="tiles">
    <div class="tile">Sales<br><b id="sales">£0</b></div>
    <div class="tile">Products<br><b id="products">0</b></div>
    <div class="tile">Top<br><b id="top">-</b></div>
  </div>

  <div class="chartBox">
    <canvas id="barChart"></canvas>
  </div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <table id="table"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="chartBox">
    <canvas id="lineChart"></canvas>
  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab(1,this)" class="active">📊</div>
  <div onclick="switchTab(2,this)">📦</div>
  <div onclick="switchTab(3,this)">📈</div>
</div>

<script>

/* ======================
   CONFIG
====================== */

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

/* ======================
   STATE
====================== */

let RAW_DATA = {};
let FILTERED_DATA = {};
let barChart, lineChart;

/* ======================
   LOAD
====================== */

async function load(){
  try{
    let res = await fetch(URL);
    let data = await res.json();

    RAW_DATA = data;
    FILTERED_DATA = data;

    draw(FILTERED_DATA);

  }catch(e){
    console.log(e);
  }
}

/* ======================
   DATE FILTER
====================== */

function applyFilter(){

  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  if(!start || !end){
    FILTERED_DATA = RAW_DATA;
    draw(FILTERED_DATA);
    return;
  }

  let out = {};
  let s = new Date(start).getTime();
  let e = new Date(end).getTime();

  for(let d in RAW_DATA){
    let t = new Date(d).getTime();
    if(t>=s && t<=e){
      out[d]=RAW_DATA[d];
    }
  }

  FILTERED_DATA = out;
  draw(FILTERED_DATA);
}

/* ======================
   PRESETS
====================== */

function setRange(type){

  let end = new Date();
  let start = new Date();

  if(type==="7") start.setDate(end.getDate()-7);
  if(type==="30") start.setDate(end.getDate()-30);

  document.getElementById("startDate").value = formatDate(start);
  document.getElementById("endDate").value = formatDate(end);

  applyFilter();
}

function formatDate(d){
  return d.toISOString().split("T")[0];
}

/* ======================
   DRAW
====================== */

function draw(data){

  let productTotals={}, dailyTotals={}, totalSales=0;

  let dates = Object.keys(data).sort();

  for(let d of dates){

    dailyTotals[d]=0;

    for(let p in data[d]){
      let v=Number(data[d][p])||0;

      productTotals[p]=(productTotals[p]||0)+v;
      dailyTotals[d]+=v;
      totalSales+=v;
    }
  }

  let sorted = Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top5 = sorted.slice(0,5);

  document.getElementById("sales").innerText="£"+totalSales.toFixed(2);
  document.getElementById("products").innerText=sorted.length;
  document.getElementById("top").innerText=top5[0]||"-";

  /* BAR */
  if(barChart) barChart.destroy();

  barChart=new Chart(barChartCanvas(),{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d][p]||0),
        stack:"s"
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      },
      plugins:{
        tooltip:{
          callbacks:{
            label:(ctx)=>"£"+ctx.raw.toFixed(2)
          }
        }
      }
    }
  });

  /* LINE */
  if(lineChart) lineChart.destroy();

  lineChart=new Chart(lineChartCanvas(),{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales",
        data:dates.map(d=>dailyTotals[d])
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        tooltip:{
          callbacks:{
            label:(ctx)=>"£"+ctx.raw.toFixed(2)
          }
        }
      }
    }
  });

  /* TABLE */
  let html="";
  for(let p of sorted){
    html+=`<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  }
  document.getElementById("table").innerHTML=html;
}

/* canvas helpers */
function barChartCanvas(){return document.getElementById("barChart");}
function lineChartCanvas(){return document.getElementById("lineChart");}

/* ======================
   TABS
====================== */

function switchTab(n,el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    if(barChart)barChart.resize();
    if(lineChart)lineChart.resize();
  },100);
}

/* ======================
   SW
====================== */

if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js");
}

/* ======================
   INIT
====================== */

load();

/* ======================
   PWA INSTALL
====================== */

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;

  let btn=document.createElement("button");
  btn.innerText="Install App";
  btn.style.cssText="position:fixed;top:10px;right:10px;z-index:999;padding:8px;background:#38bdf8;border:none;border-radius:8px;font-weight:bold;";
  document.body.appendChild(btn);

  btn.onclick=async()=>{
    btn.remove();
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  };
});

/* ======================
   PULL REFRESH
====================== */

let startY=0,pulling=false;

document.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

document.addEventListener("touchmove",e=>{
  let dy=e.touches[0].clientY-startY;
  if(window.scrollY<5&&dy>20){
    pulling=true;
    document.getElementById("pull").style.top=Math.min(dy-60,30)+"px";
  }
});

document.addEventListener("touchend",()=>{
  if(pulling){
    document.getElementById("pull").style.top="-60px";
    load();
  }
  pulling=false;
});

</script>

</body>
</html>
