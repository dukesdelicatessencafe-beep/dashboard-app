<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:999;
}

.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input,button{
  padding:10px;
  margin:5px;
}

/* SLIDER */
.slider{
  display:flex;
  width:300vw;
  height:100vh;
  touch-action:pan-y;
}

.section{
  width:100vw;
  flex-shrink:0;
  padding:12px;
  box-sizing:border-box;
}

/* TILES */
.tiles{
  display:flex;
  gap:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  padding:10px;
  text-align:center;
}

.nav .active{
  background:#38bdf8;
}

/* TABLE */
table{width:100%;}
td{
  padding:6px;
  border-bottom:1px solid #334155;
}

/* CHART */
.chartBox{
  height:220px;
}

canvas{
  width:100% !important;
  height:220px !important;
}

</style>
</head>

<body>

<div id="splash"><div class="loader"></div></div>

<div id="login">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<div id="app" style="display:none;">

<input type="date" id="start">
<input type="date" id="end">
<button onclick="load()">Load</button>

<div id="slider" class="slider">

  <!-- TAB 1 -->
  <div class="section">
    <div class="tiles">
      <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
      <div class="tile"><div>Products</div><div id="orders">0</div></div>
      <div class="tile"><div>Top</div><div id="top">-</div></div>
    </div>
    <div class="chartBox"><canvas id="barChart"></canvas></div>
  </div>

  <!-- TAB 2 -->
  <div class="section">
    <div id="tableArea"></div>
  </div>

  <!-- TAB 3 -->
  <div class="section">
    <div class="chartBox"><canvas id="lineChart"></canvas></div>
  </div>

</div>
</div>

<div class="nav">
  <div onclick="goTo(0,this)" class="active">📊</div>
  <div onclick="goTo(1,this)">📦</div>
  <div onclick="goTo(2,this)">📈</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

/* ELEMENT FIX (THIS WAS MISSING) */
const salesEl = document.getElementById("sales");
const ordersEl = document.getElementById("orders");
const topEl = document.getElementById("top");
const barCanvas = document.getElementById("barChart");
const lineCanvas = document.getElementById("lineChart");
const tableArea = document.getElementById("tableArea");

let barChart, lineChart;
let currentIndex = 0;
const slider = document.getElementById("slider");

/* SWIPE */
let startX=0,currentX=0,isDragging=false;

slider.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  isDragging=true;
});

slider.addEventListener("touchmove",e=>{
  if(!isDragging)return;
  currentX=e.touches[0].clientX;
  let diff=currentX-startX;
  slider.style.transform=`translateX(${-(currentIndex*window.innerWidth)+diff}px)`;
});

slider.addEventListener("touchend",()=>{
  isDragging=false;
  let diff=currentX-startX;
  if(diff<-50 && currentIndex<2) currentIndex++;
  if(diff>50 && currentIndex>0) currentIndex--;
  updateSlide();
});

function goTo(i,el){
  currentIndex=i;
  updateSlide();
  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}

function updateSlide(){
  slider.style.transition="0.3s";
  slider.style.transform=`translateX(-${currentIndex*100}vw)`;
  setTimeout(()=>{
    slider.style.transition="none";
    if(barChart) barChart.resize();
    if(lineChart) lineChart.resize();
  },300);
}

/* START */
window.onload=()=>{
  let today=new Date().toISOString().split("T")[0];
  start.value=today;
  end.value=today;
  document.getElementById("splash").style.display="none";
};

/* LOGIN */
function check(){
  if(pw.value==="1234"){
    login.style.display="none";
    app.style.display="block";
    load();
  }
}

/* LOAD */
async function load(){
  try{
    let res=await fetch(SCRIPT_URL);
    let map=await res.json();
    draw(map);
  }catch(e){
    console.log(e);
    alert("Data failed to load");
  }
}

/* DRAW */
function draw(map){

  let productTotals={},dailyTotals={},dates=Object.keys(map).sort();
  let sales=0;

  for(let d in map){
    dailyTotals[d]=0;
    for(let p in map[d]){
      let v=Number(map[d][p])||0;
      productTotals[p]=(productTotals[p]||0)+v;
      dailyTotals[d]+=v;
      sales+=v;
    }
  }

  let sorted=Object.keys(productTotals).sort((a,b)=>productTotals[b]-productTotals[a]);
  let top5=sorted.slice(0,5);

  salesEl.innerText="£"+sales.toFixed(2);
  ordersEl.innerText=sorted.length;
  topEl.innerText=top5[0]||"-";

  if(barChart) barChart.destroy();

  barChart=new Chart(barCanvas,{
    type:'bar',
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>map[d][p]||0),
        stack:'s'
      }))
    },
    options:{responsive:true,maintainAspectRatio:false}
  });

  if(lineChart) lineChart.destroy();

  lineChart=new Chart(lineCanvas,{
    type:'line',
    data:{
      labels:dates,
      datasets:[{label:"Sales",data:dates.map(d=>dailyTotals[d])}]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });

  let html="<table>";
  sorted.forEach(p=>{
    html+=`<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  });
  html+="</table>";
  tableArea.innerHTML=html;
}

</script>

</body>
</html>
