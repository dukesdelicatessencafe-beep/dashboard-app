<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  transition:.4s;
}
#loading.hidden{opacity:0;pointer-events:none;}

.spinner{
  width:40px;height:40px;
  border:3px solid #334155;
  border-top:3px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
}
input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:bold;}

/* APP */
#app{display:none;height:100vh;overflow:hidden;}

/* TABS */
.tab{
  display:none;
  height:calc(100vh - 70px);
  overflow:auto;
  padding:10px;
}
.tab.active{
  display:block;
  animation:fade .3s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.card{
  background:#1e293b;
  padding:10px;
  border-radius:14px;
  transition:.2s;
}
.card:active{transform:scale(.97);}

/* DATES */
.dates{
  display:flex;
  gap:8px;
  margin:10px 0;
}
.dates input{flex:1;}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:14px;
  margin-top:10px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
td{padding:8px;border-bottom:1px solid #334155;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  background:#0b1220;
}
.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.nav .active{color:#38bdf8;}

/* TOAST */
#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(30,41,59,0.95);
  padding:12px 18px;
  border-radius:14px;
  opacity:0;
  transition:.25s;
}
#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Syncing data...</p>
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <!-- TAB 1 -->
  <div id="tab1" class="tab active">

    <div class="grid">
      <div class="card">Sales<br><b id="sales">£0</b></div>
      <div class="card">Products<br><b id="products">0</b></div>
      <div class="card">Top<br><b id="top">-</b></div>
    </div>

    <div class="dates">
      <input id="startDate" type="date">
      <input id="endDate" type="date">
      <button onclick="setRange('apply')">Apply</button>
      <button onclick="setRange('7')">7D</button>
      <button onclick="setRange('30')">30D</button>
    </div>

    <canvas id="barChart"></canvas>

  </div>

  <!-- TAB 2 -->
  <div id="tab2" class="tab">
    <canvas id="salesChart"></canvas>
    <div id="insights"></div>
  </div>

  <!-- TAB 3 -->
  <div id="tab3" class="tab">
    <h3>Products</h3>
    <table id="productTable"></table>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div class="active" onclick="switchTab(1,this)">Home</div>
  <div onclick="switchTab(2,this)">Stats</div>
  <div onclick="switchTab(3,this)">Products</div>
</div>

<div id="toast"></div>

<script>

const App={

state:{RAW:{},barChart:null,salesChart:null},

config:{
URL:"https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
password:"1234"
},

toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1800);
},

login(){
const p=document.getElementById("pass");
if(!p||p.value!==this.config.password){
this.toast("Wrong password");return;
}
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
this.load();
},

async load(){
try{
document.getElementById("loading").classList.remove("hidden");

const res=await fetch(this.config.URL,{cache:"no-store"});
const data=await res.json();

this.state.RAW=data;
this.draw(data);

this.toast("Dashboard ready");

}catch(e){
console.error(e);
this.toast("Load failed");
}

setTimeout(()=>document.getElementById("loading").classList.add("hidden"),600);
},

setRange(type){
const now=new Date();
let start=new Date();

if(type==="7") start.setDate(now.getDate()-7);
if(type==="30") start.setDate(now.getDate()-30);

if(type==="apply") return this.applyRange();

startDate.value=start.toISOString().split("T")[0];
endDate.value=now.toISOString().split("T")[0];

this.applyRange();
},

applyRange(){
const s=new Date(startDate.value).getTime();
const e=new Date(endDate.value).getTime();

const out={};
for(const d in this.state.RAW){
const t=new Date(d).getTime();
if(t>=s&&t<=e) out[d]=this.state.RAW[d];
}

this.draw(out);
},

draw(data){

let pt={},dt={},total=0;
const dates=Object.keys(data).sort();

for(const d of dates){
dt[d]=0;
for(const p in data[d]){
const v=+data[d][p]||0;
pt[p]=(pt[p]||0)+v;
dt[d]+=v;
total+=v;
}
}

const sorted=Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
const top5=sorted.slice(0,5);

sales.innerText="£"+total.toFixed(2);
products.innerText=sorted.length;
top.innerText=top5[0]||"-";

productTable.innerHTML=
sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

if(this.state.barChart) this.state.barChart.destroy();
this.state.barChart=new Chart(barChart,{
type:"bar",
data:{
labels:dates,
datasets:top5.map(p=>({
label:p,
data:dates.map(d=>data[d]?.[p]||0),
stack:"s"
}))
},
options:{
animation:{duration:500},
scales:{x:{stacked:true},y:{stacked:true}}
}
});

if(this.state.salesChart) this.state.salesChart.destroy();
this.state.salesChart=new Chart(salesChart,{
type:"bar",
data:{
labels:dates,
datasets:[{label:"Sales (£)",data:dates.map(d=>dt[d])}]
},
options:{animation:{duration:500}}
});

insights.innerHTML="<b>Top Products</b><br>"+
top5.map(p=>`• ${p} (£${pt[p].toFixed(2)})`).join("<br>");
},

switchTab(n,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById("tab"+n).classList.add("active");

document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
},

initGestures(){
const c=document.getElementById("app");
if(!c) return;

let startX=0;

c.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

c.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;

if(diff>80) this.switchTab(1,document.querySelectorAll(".nav div")[0]);
if(diff<-80) this.switchTab(3,document.querySelectorAll(".nav div")[2]);
});
}

};

function login(){App.login();}
function setRange(t){App.setRange(t);}
function switchTab(n,el){App.switchTab(n,el);}

document.addEventListener("DOMContentLoaded",()=>{
App.initGestures();
});

</script>

</body>
</html>
