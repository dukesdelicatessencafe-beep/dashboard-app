<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard Level 2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
}

/* INPUTS */
input,button{
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:#38bdf8;
  font-weight:600;
  cursor:pointer;
}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow:hidden;
}

/* TABS */
.tabs{
  display:flex;
  width:100%;
  height:calc(100vh - 60px);
  transition:transform .35s ease;
}

.tab{
  min-width:100%;
  padding:14px;
  overflow:auto;
}

/* =========================
   LEVEL 2 KPI CARDS
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:#111827;
  padding:14px;
  border-radius:16px;
  border:1px solid #1f2937;
  position:relative;
  overflow:hidden;
}

/* KPI TREND */
.trend{
  font-size:12px;
  margin-top:6px;
  opacity:0.8;
}

/* UP / DOWN COLORS */
.up{color:#22c55e;}
.down{color:#ef4444;}

/* FILTER BAR */
.dates{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.dates input{
  flex:1;
}

/* CHARTS */
canvas{
  background:#111827;
  border-radius:16px;
  margin-top:12px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:10px;
  border-bottom:1px solid #1f2937;
}

/* PANEL */
.panel{
  margin-top:12px;
  background:#111827;
  padding:12px;
  border-radius:16px;
  border:1px solid #1f2937;
}

/* LOADER */
#loading{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:#0b1220;
  z-index:999;
  color:#38bdf8;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transition:.2s;
}

#toast.show{opacity:1;}

</style>
</head>

<body>

<div id="loading">Loading...</div>

<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<div id="app">

  <div class="tabs" id="tabs">

    <!-- HOME -->
    <div class="tab">

      <div class="grid">
        <div class="card">
          Sales<br><b id="sales">£0</b>
          <div class="trend" id="salesTrend"></div>
        </div>

        <div class="card">
          Products<br><b id="products">0</b>
          <div class="trend" id="productsTrend"></div>
        </div>

        <div class="card">
          Top<br><b id="top">-</b>
          <div class="trend">Top performer</div>
        </div>
      </div>

      <div class="dates">
        <input id="startDate" type="date">
        <input id="endDate" type="date">
        <button onclick="App.applyRange()">Apply</button>
        <button onclick="App.setRange('today')">Today</button>
        <button onclick="App.setRange('7')">7D</button>
        <button onclick="App.setRange('30')">30D</button>
      </div>

      <div class="panel">
        <b>Top Products</b>
        <div id="homeTopList">-</div>
      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- STATS -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights" class="panel"></div>
    </div>

    <!-- PRODUCTS -->
    <div class="tab">
      <table id="productTable"></table>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>

const App = (() => {

  const CONFIG = {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    PASSWORD: "1234"
  };

  const STATE = {
    raw: {},
    barChart: null,
    salesChart: null,
    lastTotal: 0,
    lastProducts: 0
  };

  const $ = id => document.getElementById(id);
  const fmt = v => "£" + (Number(v || 0)).toFixed(2);

  const toast = (msg) => {
    const t = $("toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1500);
  };

  const login = () => {
    if ($("pass").value !== CONFIG.PASSWORD) {
      toast("Wrong password");
      return;
    }

    $("login").style.display = "none";
    $("app").style.display = "block";

    load();
  };

  const load = async () => {
    try {
      $("loading").style.display = "flex";

      const res = await fetch(CONFIG.URL, { cache: "no-store" });
      const data = await res.json();

      STATE.raw = data;
      draw(data);

    } catch (e) {
      toast("Load failed");
    } finally {
      $("loading").style.display = "none";
    }
  };

  const setRange = (type) => {
    const now = new Date();
    let start = new Date();

    if (type === "today") start.setHours(0,0,0,0);
    if (type === "7") start.setDate(now.getDate()-7);
    if (type === "30") start.setDate(now.getDate()-30);

    $("startDate").value = start.toISOString().split("T")[0];
    $("endDate").value = now.toISOString().split("T")[0];

    applyRange();
  };

  const applyRange = () => {
    const s = new Date($("startDate").value + "T00:00:00").getTime();
    const e = new Date($("endDate").value + "T23:59:59").getTime();

    const out = {};

    for (const d in STATE.raw) {
      const t = new Date(d).getTime();
      if (!isNaN(t) && t >= s && t <= e) {
        out[d] = STATE.raw[d];
      }
    }

    draw(out);
  };

  const draw = (data) => {

    let pt = {}, dt = {}, total = 0;

    const dates = Object.keys(data || {}).sort();

    for (const d of dates) {
      dt[d] = 0;
      for (const p in data[d]) {
        const v = Number(data[d][p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5 = sorted.slice(0,5);

    // KPI DELTA (LEVEL 2 FEATURE)
    const salesDelta = total - STATE.lastTotal;
    const productDelta = sorted.length - STATE.lastProducts;

    $("sales").textContent = fmt(total);
    $("products").textContent = sorted.length;
    $("top").textContent = top5[0] || "-";

    $("salesTrend").innerHTML =
      salesDelta >= 0
        ? `<span class="up">▲ +${fmt(salesDelta)}</span>`
        : `<span class="down">▼ ${fmt(salesDelta)}</span>`;

    $("productsTrend").innerHTML =
      productDelta >= 0
        ? `<span class="up">▲ +${productDelta}</span>`
        : `<span class="down">▼ ${productDelta}</span>`;

    STATE.lastTotal = total;
    STATE.lastProducts = sorted.length;

    $("homeTopList").innerHTML =
      top5.length
        ? top5.map((p,i)=>`${i+1}. ${p} — ${fmt(pt[p])}`).join("<br>")
        : "-";

    $("productTable").innerHTML =
      sorted.map(p=>`<tr><td>${p}</td><td>${fmt(pt[p])}</td></tr>`).join("");

    if (STATE.barChart) STATE.barChart.destroy();
    STATE.barChart = new Chart($("barChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: top5.map(p => ({
          label: p,
          data: dates.map(d => data[d]?.[p] || 0),
          stack: "stack1"
        }))
      },
      options: {
        responsive: true,
        scales: {
          x: { stacked: true },
          y: { stacked: true }
        }
      }
    });

    if (STATE.salesChart) STATE.salesChart.destroy();
    STATE.salesChart = new Chart($("salesChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: [{
          label: "Sales (£)",
          data: dates.map(d => dt[d] || 0)
        }]
      }
    });

    $("insights").innerHTML =
      top5.length
        ? "<b>Top Products</b><br>" +
          top5.map(p => `• ${p} (${fmt(pt[p])})`).join("<br>")
        : "";
  };

  const switchTab = (i, el) => {
    $("tabs").style.transform = `translateX(-${i*100}%)`;
  };

  return { login, load, setRange, applyRange, switchTab };

})();

window.App = App;

</script>

</body>
</html>
