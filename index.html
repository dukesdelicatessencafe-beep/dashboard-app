<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sales Dashboard PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 220px;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
  padding: 16px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
}

/* CHARTS */
canvas {
  background: #1e293b;
  border-radius: 12px;
  padding: 10px;
  margin-top: 10px;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}

td {
  padding: 8px;
  border-bottom: 1px solid #334155;
}

/* MOBILE */
@media (max-width: 600px) {
  body { font-size: 14px; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Dashboard Login</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div class="grid">
    <div class="card">Sales <div id="sales">£0</div></div>
    <div class="card">Products <div id="products">0</div></div>
    <div class="card">Top <div id="top">-</div></div>
  </div>

  <canvas id="barChart" height="120"></canvas>
  <canvas id="salesChart" height="120"></canvas>

  <div id="insights" style="margin-top:15px"></div>

  <table id="table"></table>

</div>

<script>

const App = {

  state: {
    RAW: {},
    barChart: null,
    salesChart: null
  },

  config: {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    password: "1234"
  },

  init(){
    console.log("PWA INIT OK");
  },

  login(){

    const pass = document.getElementById("pass");

    if(!pass){
      alert("UI not loaded");
      return;
    }

    if(pass.value !== this.config.password){
      alert("Wrong password");
      return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    this.load();
  },

  async load(){

    try{

      const res = await fetch(this.config.URL, { cache: "no-store" });

      if(!res.ok){
        throw new Error("HTTP " + res.status);
      }

      const data = await res.json();

      this.state.RAW = data;
      this.draw(data);

    } catch(err){
      console.error(err);
      alert("API failed / offline mode");
    }
  },

  draw(data){

    let pt = {}, dt = {}, total = 0;
    let dates = Object.keys(data || {}).sort();

    for(let d of dates){
      let day = data[d] || {};
      dt[d] = 0;

      for(let p in day){
        let v = Number(day[p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    let top5 = sorted.slice(0,5);

    document.getElementById("sales").innerText = "£" + total.toFixed(2);
    document.getElementById("products").innerText = sorted.length;
    document.getElementById("top").innerText = top5[0] || "-";

    document.getElementById("insights").innerHTML =
      "<h3>Top Products</h3>" +
      top5.map(p => `• ${p} (£${pt[p].toFixed(2)})`).join("<br>");

    /* BAR CHART */
    if(this.state.barChart) this.state.barChart.destroy();

    this.state.barChart = new Chart(
      document.getElementById("barChart"),
      {
        type: "bar",
        data: {
          labels: dates,
          datasets: top5.map(p => ({
            label: p,
            data: dates.map(d => data[d]?.[p] || 0)
          }))
        }
      }
    );

    /* SALES CHART */
    if(this.state.salesChart) this.state.salesChart.destroy();

    this.state.salesChart = new Chart(
      document.getElementById("salesChart"),
      {
        type: "bar",
        data: {
          labels: dates,
          datasets: [{
            label: "Sales (£)",
            data: dates.map(d => dt[d] || 0)
          }]
        }
      }
    );

    /* TABLE */
    document.getElementById("table").innerHTML =
      sorted.map(p =>
        `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`
      ).join("");
  }
};

/* GLOBAL */
function login(){
  App.login();
}

/* START */
window.addEventListener("load", () => App.init());

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
