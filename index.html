<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#login, #app { padding:20px; }

#login {
  display:flex;
  flex-direction:column;
  gap:10px;
  height:100vh;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#app { display:none; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

canvas {
  background:#1e293b;
  border-radius:10px;
  padding:10px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td {
  padding:8px;
  border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password" placeholder="Password"/>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div class="grid">
    <div class="card">Sales: <div id="sales">£0</div></div>
    <div class="card">Products: <div id="products">0</div></div>
    <div class="card">Top: <div id="top">-</div></div>
  </div>

  <canvas id="barChart" height="120"></canvas>
  <br><br>
  <canvas id="salesChart" height="120"></canvas>

  <div id="insights" style="margin-top:20px"></div>

  <table id="table"></table>

</div>

<script>

const App = {

  state: {
    RAW: {},
    barChart: null,
    salesChart: null
  },

  config: {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    password: "1234"
  },

  init(){
    console.log("INIT OK");
  },

  login(){

    const pass = document.getElementById("pass");
    const loginEl = document.getElementById("login");
    const appEl = document.getElementById("app");

    if(pass.value !== this.config.password){
      alert("Wrong password");
      return;
    }

    loginEl.style.display = "none";
    appEl.style.display = "block";

    this.load();
  },

  async load(){
    try{

      const res = await fetch(this.config.URL);
      const data = await res.json();

      this.state.RAW = data;
      this.draw(data);

    } catch(e){
      console.error(e);
      alert("API load failed");
    }
  },

  draw(data){

    let pt = {}, dt = {}, total = 0;
    let dates = Object.keys(data).sort();

    for(let d of dates){
      let day = data[d] || {};
      dt[d] = 0;

      for(let p in day){
        let v = Number(day[p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    let top5 = sorted.slice(0,5);

    document.getElementById("sales").innerText = "£" + total.toFixed(2);
    document.getElementById("products").innerText = sorted.length;
    document.getElementById("top").innerText = top5[0] || "-";

    document.getElementById("insights").innerHTML =
      "<h3>Top Products</h3>" +
      top5.map(p => `• ${p} (£${pt[p].toFixed(2)})`).join("<br>");

    /* BAR CHART */
    if(this.state.barChart) this.state.barChart.destroy();

    this.state.barChart = new Chart(
      document.getElementById("barChart"),
      {
        type:"bar",
        data:{
          labels:dates,
          datasets:top5.map(p=>({
            label:p,
            data:dates.map(d=>data[d]?.[p]||0)
          }))
        }
      }
    );

    /* SALES CHART */
    if(this.state.salesChart) this.state.salesChart.destroy();

    this.state.salesChart = new Chart(
      document.getElementById("salesChart"),
      {
        type:"bar",
        data:{
          labels:dates,
          datasets:[{
            label:"Sales",
            data:dates.map(d=>dt[d]||0)
          }]
        }
      }
    );

    /* TABLE */
    document.getElementById("table").innerHTML =
      sorted.map(p =>
        `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`
      ).join("");
  }

};

function login(){
  App.login();
}

window.onload = () => App.init();

</script>

</body>
</html>
