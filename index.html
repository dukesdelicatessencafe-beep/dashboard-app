<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.wrap{
  padding:12px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:none;
}

button{
  background:#3b82f6;
  color:white;
}

.tiles{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.tile{
  background:#1f2937;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

canvas{
  margin-top:15px;
  background:#111827;
  border-radius:12px;
  padding:10px;
}
</style>
</head>

<body>

<div class="wrap">

<h2>Sales Dashboard</h2>

<input type="date" id="start">
<input type="date" id="end">
<button onclick="loadData()">Load</button>

<div class="tiles">
  <div class="tile">
    <div>Sales</div>
    <div id="salesEl">£0</div>
  </div>

  <div class="tile">
    <div>Orders</div>
    <div id="ordersEl">0</div>
  </div>

  <div class="tile">
    <div>Top</div>
    <div id="topEl">-</div>
  </div>
</div>

<canvas id="chart"></canvas>

<div id="list" style="margin-top:15px;"></div>

</div>

<script>

let chart;

/* LOAD DATA */
async function loadData(){

  let start=document.getElementById("start").value;
  let end=document.getElementById("end").value;

  let url="https://script.google.com/macros/s/AKfycbxaNoSfFbXI_z1oVXCG4j9AtvNSuokJIQNX7YsDnCMF0Lk57AcAY3lv4gHfFUetgyDRZg/exec?start="+start+"&end="+end;

  try{
    let res=await fetch(url);
    let map=await res.json();

    draw(map);

  }catch(err){
    alert("API error");
    console.log(err);
  }
}

/* DRAW FUNCTION */
function draw(map){

  if(!map || Object.keys(map).length === 0){
    salesEl.innerText="£0";
    ordersEl.innerText="0";
    topEl.innerText="-";
    list.innerHTML="No data";
    return;
  }

  let totals={};
  let dates=Object.keys(map).sort();

  let sales=0;
  let orders=0;

  for(let d in map){
    for(let p in map[d]){
      let v=map[d][p];

      totals[p]=(totals[p]||0)+v;
      sales+=v;
      orders++;
    }
  }

  let sorted=Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  let top5=sorted.slice(0,5);

  salesEl.innerText="£"+sales.toFixed(2);
  ordersEl.innerText=orders;
  topEl.innerText=top5[0]||"-";

  let labels=dates.map(d =>
    new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
  );

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>map[d][p]||0)
      }))
    }
  });

  let html="<h3>Product Sales</h3>";

  for(let p in totals){
    html+=`<div style="padding:4px 0">${p} — £${totals[p].toFixed(2)}</div>`;
  }

  list.innerHTML=html;
}

/* DEFAULT DATE */
window.onload=()=>{
  let today=new Date().toISOString().split("T")[0];
  start.value=today;
  end.value=today;
};

</script>

</body>
</html>
