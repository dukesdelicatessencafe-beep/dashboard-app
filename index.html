<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
}

input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:bold;}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow:hidden;
  width:100%;
}

/* SWIPE WRAPPER */
.tabs-wrapper{
  display:flex;
  width:300%;
  height:calc(100vh - 70px);
  transform:translateX(0px);
  transition:transform .35s ease;
}

.tab{
  width:100%;
  flex-shrink:0;
  overflow:auto;
  padding:10px;
  box-sizing:border-box;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#0f172a;
  padding-left:6px;
  padding-right:6px;
  z-index:10;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.card{
  background:#1e293b;
  padding:10px;
  border-radius:14px;
}

/* DATE CONTROLS */
.dates{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.dates input{flex:1;}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:14px;
  margin-top:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}
td{
  padding:8px;
  border-bottom:1px solid #334155;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:none;
  background:rgba(11,18,32,0.7);
  backdrop-filter:blur(12px);
}
.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.nav .active{color:#38bdf8;}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0f172a;
  z-index:999;
}

.spinner{
  width:40px;height:40px;
  border:3px solid #334155;
  border-top:3px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 14px;
  border-radius:12px;
  opacity:0;
  transition:.2s;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Syncing...</p>
</div>

<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="login()">Enter</button>
</div>

<div id="app">

  <div class="tabs-wrapper" id="wrap">

    <!-- TAB 1 -->
    <div class="tab">

      <div class="header">

        <div class="grid">
          <div class="card">Sales<br><b id="sales">£0</b></div>
          <div class="card">Products<br><b id="products">0</b></div>
          <div class="card">Top<br><b id="top">-</b></div>
        </div>

        <div class="dates">
          <input id="startDate" type="date">
          <input id="endDate" type="date">

          <button onclick="setRange('today')">Today</button>
          <button onclick="setRange('7')">7D</button>
          <button onclick="setRange('30')">30D</button>
          <button onclick="setRange('apply')">Apply</button>
        </div>

      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- TAB 2 -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights"></div>
    </div>

    <!-- TAB 3 -->
    <div class="tab">
      <h3>Products</h3>
      <table id="productTable"></table>
    </div>

  </div>

</div>

<div class="nav" id="nav">
  <div class="active" onclick="switchTab(0,this)">Home</div>
  <div onclick="switchTab(1,this)">Stats</div>
  <div onclick="switchTab(2,this)">Products</div>
</div>

<script>

const App={

state:{RAW:{},tab:0,barChart:null,salesChart:null},

config:{
URL:"https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
password:"1234"
},

get(id){return document.getElementById(id);},

login(){
if(pass.value!==this.config.password){
alert("Wrong password");return;
}
login.style.display="none";
app.style.display="block";
nav.style.display="flex";
this.load();
},

async load(){
loading.style.display="flex";
const res=await fetch(this.config.URL,{cache:"no-store"});
const data=await res.json();
this.state.RAW=data;
this.draw(data);
loading.style.display="none";
},

setRange(t){

const n=new Date();
let s=new Date();

if(t==="today") s.setHours(0,0,0,0);
if(t==="7") s.setDate(n.getDate()-7);
if(t==="30") s.setDate(n.getDate()-30);

if(t!=="apply"){
startDate.value=s.toISOString().split("T")[0];
endDate.value=n.toISOString().split("T")[0];
}

this.applyRange();
},

applyRange(){

const s=new Date(startDate.value).getTime();
const e=new Date(endDate.value).getTime();

const out={};
for(const d in this.state.RAW){
const t=new Date(d).getTime();
if(t>=s&&t<=e) out[d]=this.state.RAW[d];
}

this.draw(out);
},

draw(data){

let pt={},dt={},total=0;
const dates=Object.keys(data).sort();

for(const d of dates){
dt[d]=0;
for(const p in data[d]){
const v=+data[d][p]||0;
pt[p]=(pt[p]||0)+v;
dt[d]+=v;
total+=v;
}
}

const sorted=Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
const top5=sorted.slice(0,5);

sales.innerText="£"+total.toFixed(2);
products.innerText=sorted.length;
top.innerText=top5[0]||"-";

productTable.innerHTML=
sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

const money=v=>"£"+v.toFixed(2);

if(this.state.barChart) this.state.barChart.destroy();
this.state.barChart=new Chart(barChart,{
type:"bar",
data:{
labels:dates,
datasets:top5.map(p=>({
label:p,
data:dates.map(d=>data[d]?.[p]||0),
stack:"s"
}))
},
options:{
scales:{
y:{ticks:{callback:money}},
x:{stacked:true}
}
}
});

if(this.state.salesChart) this.state.salesChart.destroy();
this.state.salesChart=new Chart(salesChart,{
type:"bar",
data:{
labels:dates,
datasets:[{label:"Sales (£)",data:dates.map(d=>dt[d])}]
},
options:{
scales:{y:{ticks:{callback:money}}}
}
});

},

switchTab(i,el){
this.state.tab=i;
wrap.style.transform=`translateX(-${i*100}%)`;

document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

};

function login(){App.login();}
function setRange(t){App.setRange(t);}
function switchTab(i,el){App.switchTab(i,el);}

</script>

</body>
</html>
