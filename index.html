<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard Level 12 Final</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* APP */
#app{
  display:none;
  height:100vh;
}

/* LOADER */
#loading{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  z-index:999;
}

/* HEADER */
.header{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:#0b1220;
  border-bottom:1px solid #1e293b;
}

/* VIEWS */
.views{
  display:flex;
  height:calc(100vh - 120px);
  transition:transform .35s ease;
  width:100%;
  overflow-x:hidden;
}

.view{
  min-width:100%;
  width:100%;
  padding:14px;
  box-sizing:border-box;
  overflow:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:#1e293b;
  padding:16px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.kpi{
  font-size:26px;
  font-weight:800;
}

/* FILTERS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:600;cursor:pointer;}

/* PANEL */
.panel{
  background:#1e293b;
  padding:12px;
  border-radius:14px;
  margin-top:12px;
}

/* DRILL PANEL */
.drill{
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  background:#0b1220;
  border:1px solid #1e293b;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  background:#0b1220;
  border-top:1px solid #1e293b;
}

.nav div{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.nav .icon{font-size:18px;}
.nav .active{color:#38bdf8}

/* TABLE */
table{width:100%;border-collapse:collapse;}
td{padding:8px;border-bottom:1px solid #334155;}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:14px;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="pass" type="password">
<button onclick="App.login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<div>SaaS Dashboard</div>
<div id="top">-</div>
</div>

<div class="views" id="views">

<!-- HOME -->
<div class="view">

<div class="grid">
<div class="card">Sales<div id="sales" class="kpi">£0.00</div></div>
<div class="card">Products<div id="products" class="kpi">0</div></div>
<div class="card">Top<div id="topCard" class="kpi">-</div></div>
</div>

<div class="filters">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="App.applyRange()">Apply</button>
<button onclick="App.setRange(7)">7D</button>
<button onclick="App.setRange(30)">30D</button>
</div>

<div class="panel">
<b>Top Products (Click to Drill Down)</b>
<div id="homeTopList"></div>
</div>

<div id="drill" class="drill">Select a product to view details</div>

<canvas id="barChart"></canvas>

</div>

<!-- STATS -->
<div class="view">
<canvas id="salesChart"></canvas>
</div>

<!-- PRODUCTS -->
<div class="view">
<table id="productTable"></table>
</div>

</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="App.switchTab(0,this)" class="active"><div class="icon">🏠</div>Home</div>
<div onclick="App.switchTab(1,this)"><div class="icon">📊</div>Stats</div>
<div onclick="App.switchTab(2,this)"><div class="icon">📦</div>Products</div>
</div>

<script>

const App = (() => {

const CONFIG = {
URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
PASSWORD: "1234"
};

const STATE = {
raw: {},
bar: null,
sales: null,
selectedProduct: null
};

const $ = id => document.getElementById(id);

/* LOGIN */
const login = () => {
if ($("pass").value !== CONFIG.PASSWORD) return;
$("login").style.display = "none";
$("app").style.display = "block";
load();
};

/* LOAD */
const load = async () => {
$("loading").style.display = "flex";
const res = await fetch(CONFIG.URL);
STATE.raw = await res.json();
draw(STATE.raw);
$("loading").style.display = "none";
};

/* RANGE */
const setRange = (d) => {
const now = new Date();
const s = new Date();
s.setDate(now.getDate() - d);

$("startDate").value = s.toISOString().split("T")[0];
$("endDate").value = now.toISOString().split("T")[0];
applyRange();
};

const applyRange = () => {
const s = new Date($("startDate").value).getTime();
const e = new Date($("endDate").value).getTime();

let out = {};
for (const d in STATE.raw) {
const t = new Date(d).getTime();
if (t >= s && t <= e) out[d] = STATE.raw[d];
}

draw(out);
};

/* DRILL DOWN */
const drill = (product, data) => {

STATE.selectedProduct = product;

let total = 0;
let days = [];

for (const d in data) {
const v = data[d]?.[product] || 0;
if (v > 0) {
total += v;
days.push(`${d}: £${v.toFixed(2)}`);
}
}

$("drill").innerHTML =
`<b>${product}</b><br>Total: £${total.toFixed(2)}<br><br>` +
days.join("<br>");
};

/* DRAW */
const draw = (data) => {

let pt = {}, dt = {}, total = 0;
const dates = Object.keys(data || {}).sort();

for (const d of dates) {
dt[d] = 0;
for (const p in data[d]) {
const v = +data[d][p] || 0;
pt[p] = (pt[p] || 0) + v;
dt[d] += v;
total += v;
}
}

const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
const top5 = sorted.slice(0,5);

/* KPI */
$("sales").textContent = "£" + total.toFixed(2);
$("products").textContent = sorted.length;
$("topCard").textContent = top5[0] || "-";

/* TOP LIST (CLICKABLE) */
$("homeTopList").innerHTML =
top5.map(p =>
`<div onclick="App.selectProduct('${p}')">• ${p} (£${pt[p].toFixed(2)})</div>`
).join("<br>");

/* TABLE */
$("productTable").innerHTML =
sorted.map(p => `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

/* BAR */
if (STATE.bar) STATE.bar.destroy();

STATE.bar = new Chart($("barChart"), {
type: "bar",
data: {
labels: dates,
datasets: top5.map((p,i)=>({
label: p,
data: dates.map(d => data[d]?.[p] || 0),
stack: "stack1",
backgroundColor: ["#38bdf8","#6366f1","#22c55e","#f59e0b","#ef4444"][i]
}))
},
options: {
responsive: true,
scales: {
x: { stacked: true },
y: {
stacked: true,
ticks: {
callback: v => "£" + v
}
}
}
}
});

/* SALES */
if (STATE.sales) STATE.sales.destroy();

STATE.sales = new Chart($("salesChart"), {
type: "bar",
data: {
labels: dates,
datasets: [{
label: "Sales",
data: dates.map(d => dt[d] || 0)
}]
}
});

};

/* PRODUCT SELECT */
const selectProduct = (p) => {
STATE.selectedProduct = p;
drill(p, STATE.raw);
};

/* TAB */
const switchTab = (i, el) => {
$("views").style.transform = `translateX(-${i*100}%)`;
document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
};

return {
login,
load,
setRange,
applyRange,
switchTab,
selectProduct
};

})();

window.App = App;

</script>

</body>
</html>
