<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

#login, #app{
  height:100vh;
}

#login{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
}

input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:bold;}

/* APP */
#app{
  display:none;
  position:relative;
}

/* SLIDES */
.tabs{
  display:flex;
  width:300%;
  height:calc(100vh - 60px);
  transition:transform .35s ease;
}

.tab{
  width:100%;
  overflow:auto;
  padding:10px;
  box-sizing:border-box;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#0f172a;
  padding-bottom:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

/* DATES */
.dates{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.dates input{flex:1;}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:12px;
  margin-top:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  background:#0b1220;
}

.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.nav .active{color:#38bdf8;}

#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  opacity:0;
  transition:.2s;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <div class="tabs" id="tabs">

    <!-- TAB 1 -->
    <div class="tab">
      <div class="header">

        <div class="grid">
          <div class="card">Sales<br><b id="sales">£0</b></div>
          <div class="card">Products<br><b id="products">0</b></div>
          <div class="card">Top<br><b id="top">-</b></div>
        </div>

        <div class="dates">
          <input id="startDate" type="date">
          <input id="endDate" type="date">
          <button onclick="App.applyRange()">Apply</button>
          <button onclick="App.setRange('today')">Today</button>
          <button onclick="App.setRange('7')">7D</button>
          <button onclick="App.setRange('30')">30D</button>
        </div>

      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- TAB 2 -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights"></div>
    </div>

    <!-- TAB 3 -->
    <div class="tab">
      <h3>Products</h3>
      <table id="productTable" width="100%"></table>
    </div>

  </div>

</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div onclick="App.switchTab(0,this)" class="active">Home</div>
  <div onclick="App.switchTab(1,this)">Stats</div>
  <div onclick="App.switchTab(2,this)">Products</div>
</div>

<div id="toast"></div>

<script>

const App = {

state:{
RAW:{},
tab:0,
barChart:null,
salesChart:null
},

URL:"https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
password:"1234",

get:id=>document.getElementById(id),

toast(msg){
const t=this.get("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1500);
},

login(){
if(this.get("pass").value!==this.password){
this.toast("Wrong password");
return;
}

this.get("login").style.display="none";
this.get("app").style.display="block";
this.get("nav").style.display="flex";

this.load();
},

async load(){
try{
const res = await fetch(this.URL,{cache:"no-store"});
const data = await res.json();

this.state.RAW = data;
this.draw(data);
this.toast("Updated");

}catch(e){
this.toast("Load failed");
}
},

setRange(type){

const now = new Date();
let start = new Date();

if(type==="today") start.setHours(0,0,0,0);
if(type==="7") start.setDate(now.getDate()-7);
if(type==="30") start.setDate(now.getDate()-30);

this.get("startDate").value = start.toISOString().split("T")[0];
this.get("endDate").value = now.toISOString().split("T")[0];

this.applyRange();
},

applyRange(){

const s = new Date(this.get("startDate").value).getTime();
const e = new Date(this.get("endDate").value).getTime();

const out = {};

for(const d in this.state.RAW){
const t = new Date(d).getTime();
if(t>=s && t<=e) out[d]=this.state.RAW[d];
}

this.draw(out);
},

draw(data){

let pt={}, dt={}, total=0;

const dates = Object.keys(data||{}).sort();

for(const d of dates){
dt[d]=0;

for(const p in data[d]){
const v = Number(data[d][p]||0);
pt[p]=(pt[p]||0)+v;
dt[d]+=v;
total+=v;
}
}

const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
const top5 = sorted.slice(0,5);

this.get("sales").innerText = "£"+total.toFixed(2);
this.get("products").innerText = sorted.length;
this.get("top").innerText = top5[0]||"-";

this.get("productTable").innerHTML =
sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

const money = v=>"£"+v.toFixed(2);

/* BAR */
if(this.state.barChart) this.state.barChart.destroy();

this.state.barChart = new Chart(this.get("barChart"),{
type:"bar",
data:{
labels:dates,
datasets:top5.map(p=>({
label:p,
data:dates.map(d=>data[d]?.[p]||0),
stack:"s"
}))
},
options:{
scales:{
y:{ticks:{callback:money}},
x:{stacked:true}
},
plugins:{
tooltip:{callbacks:{label:c=>c.dataset.label+": "+money(c.raw)}}
}
}
});

/* SALES */
if(this.state.salesChart) this.state.salesChart.destroy();

this.state.salesChart = new Chart(this.get("salesChart"),{
type:"bar",
data:{
labels:dates,
datasets:[{
label:"Sales (£)",
data:dates.map(d=>dt[d]||0)
}]
},
options:{
scales:{
y:{ticks:{callback:money}}
},
plugins:{
tooltip:{callbacks:{label:c=>money(c.raw)}}
}
}
});

/* INSIGHTS */
this.get("insights").innerHTML =
"<b>Top Products</b><br>" +
top5.map(p=>`• ${p} (£${pt[p].toFixed(2)})`).join("<br>");
},

switchTab(i,el){
this.state.tab = i;
this.get("tabs").style.transform = `translateX(-${i*100}%)`;

document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

};

</script>

</body>
</html>
