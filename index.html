<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard Stable v4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* INPUT */
input,button{
  padding:12px;
  border-radius:10px;
  border:none;
}

input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:bold;}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* LOADER */
#loading{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:999;
}

/* =========================
   SAAS LAYOUT ENGINE (FIXED)
========================= */
.tabs{
  display:flex;
  width:300%;
  height:calc(100vh - 60px);
  transition:transform .45s cubic-bezier(0.22,1,0.36,1);
  will-change:transform;
}

.tab{
  flex:0 0 100%;
  width:100%;
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  padding:14px;
  box-sizing:border-box;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  background:#0b1220;
  border-top:1px solid #1e293b;
}

.nav div{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.nav .active{
  color:#38bdf8;
}

/* KPI GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:#1e293b;
  padding:14px;
  border-radius:14px;
}

/* TOP BOX */
#homeTopProducts{
  margin-top:10px;
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:12px;
  margin-top:12px;
  width:100% !important;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  opacity:0;
  transition:.2s;
}
#toast.show{opacity:1;}

/* MOBILE */
@media(max-width:768px){
  body{overflow:auto;}
  .grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div id="loading">Loading...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <div class="tabs" id="tabs">

    <!-- HOME -->
    <div class="tab">

      <div class="grid">
        <div class="card">Sales<br><b id="sales">£0</b></div>
        <div class="card">Products<br><b id="products">0</b></div>
        <div class="card">Top<br><b id="top">-</b></div>
      </div>

      <div id="homeTopProducts">
        <b>Top Products</b>
        <div id="homeTopList">-</div>
      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- STATS -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights"></div>
    </div>

    <!-- PRODUCTS -->
    <div class="tab">
      <table id="productTable"></table>
    </div>

  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div onclick="App.switchTab(0,this)" class="active">🏠</div>
  <div onclick="App.switchTab(1,this)">📈</div>
  <div onclick="App.switchTab(2,this)">📦</div>
</div>

<div id="toast"></div>

<script>

const App = (() => {

  const CONFIG = {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    PASSWORD: "1234"
  };

  const STATE = {
    raw: {},
    barChart: null,
    salesChart: null
  };

  const $ = id => document.getElementById(id);

  const fmt = v => "£" + (Number(v || 0)).toFixed(2);

  const toast = (msg) => {
    const t = $("toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
  };

  const login = () => {
    if ($("pass").value !== CONFIG.PASSWORD) return toast("Wrong password");

    $("login").style.display = "none";
    $("app").style.display = "block";
    $("nav").style.display = "flex";

    load();
  };

  const load = async () => {
    $("loading").style.display = "flex";
    try {
      const res = await fetch(CONFIG.URL);
      STATE.raw = await res.json();
      draw(STATE.raw);
    } catch {
      toast("Load failed");
    }
    $("loading").style.display = "none";
  };

  const draw = (data) => {

    let pt = {}, dt = {}, total = 0;

    const dates = Object.keys(data || {}).sort();

    for (const d of dates) {
      dt[d] = 0;
      for (const p in data[d]) {
        const v = Number(data[d][p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5 = sorted.slice(0,5);

    $("sales").textContent = fmt(total);
    $("products").textContent = sorted.length;
    $("top").textContent = top5[0] || "-";

    $("homeTopList").innerHTML =
      top5.length
        ? top5.map((p,i)=>`${i+1}. ${p} — ${fmt(pt[p])}`).join("<br>")
        : "-";

    $("productTable").innerHTML =
      sorted.map(p=>`<tr><td>${p}</td><td>${fmt(pt[p])}</td></tr>`).join("");

    if (STATE.barChart) STATE.barChart.destroy();
    STATE.barChart = new Chart($("barChart"), {
      type:"bar",
      data:{
        labels:dates,
        datasets:top5.map(p=>({
          label:p,
          data:dates.map(d=>data[d]?.[p]||0),
          stack:"s"
        }))
      },
      options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true}}}
    });

    if (STATE.salesChart) STATE.salesChart.destroy();
    STATE.salesChart = new Chart($("salesChart"), {
      type:"bar",
      data:{
        labels:dates,
        datasets:[{
          label:"Sales",
          data:dates.map(d=>dt[d]||0)
        }]
      }
    });
  };

  const switchTab = (i, el) => {
    $("tabs").style.transform = `translateX(-${i*100}%)`;
    document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
  };

  return { login, load, switchTab };

})();

window.App = App;

</script>

</body>
</html>
