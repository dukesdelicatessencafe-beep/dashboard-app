<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard Pro Stable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* APP */
#app{
  display:none;
  height:100vh;
  position:relative;
}

/* LOADER */
#loading{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  z-index:999;
}

/* TABS */
.tabs{
  display:flex;
  height:calc(100vh - 60px);
  transition:transform .35s ease;
  will-change:transform;
}

.tab{
  min-width:100%;
  padding:12px;
  overflow:auto;
  box-sizing:border-box;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  background:#0b1220;
}

.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.nav .active{
  color:#38bdf8;
}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.kpi{
  font-size:22px;
  font-weight:bold;
  display:block;
  margin-top:6px;
}

/* INPUTS */
.dates{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

input{
  background:#0b1220;
  color:white;
}

button{
  background:#38bdf8;
  font-weight:bold;
}

/* PANELS */
.panel{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:12px;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){
  .grid{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loading">Loading...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <div class="tabs" id="tabs">

    <!-- HOME -->
    <div class="tab">

      <div class="grid">
        <div class="card">
          Sales
          <span id="sales" class="kpi">£0</span>
        </div>

        <div class="card">
          Products
          <span id="products" class="kpi">0</span>
        </div>

        <div class="card">
          Top
          <span id="top" class="kpi">-</span>
        </div>
      </div>

      <div class="dates">
        <input id="startDate" type="date">
        <input id="endDate" type="date">

        <button onclick="App.applyRange()">Apply</button>
        <button onclick="App.setRange('today')">Today</button>
        <button onclick="App.setRange('7')">7D</button>
        <button onclick="App.setRange('30')">30D</button>
      </div>

      <div class="panel">
        <b>Top Products</b>
        <div id="homeTopList">-</div>
      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- STATS -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
    </div>

    <!-- PRODUCTS -->
    <div class="tab">
      <table id="productTable"></table>
    </div>

  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="App.switchTab(0,this)" class="active">Home</div>
  <div onclick="App.switchTab(1,this)">Stats</div>
  <div onclick="App.switchTab(2,this)">Products</div>
</div>

<script>

const App = (() => {

  const CONFIG = {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    PASSWORD: "1234"
  };

  const STATE = {
    raw: {},
    barChart: null,
    salesChart: null
  };

  const $ = id => document.getElementById(id);

  // ================= KPI ANIMATION =================
  const animateKPI = (el, value) => {
    if (!el) return;
    let cur = 0;
    const step = value / 25;

    const t = setInterval(() => {
      cur += step;
      if (cur >= value) {
        el.textContent = "£" + value.toFixed(2);
        clearInterval(t);
      } else {
        el.textContent = "£" + cur.toFixed(2);
      }
    }, 15);
  };

  // ================= LOGIN =================
  const login = () => {
    if ($("pass").value !== CONFIG.PASSWORD) return;

    $("login").style.display = "none";
    $("app").style.display = "block";

    load();
  };

  // ================= LOAD =================
  const load = async () => {
    $("loading").style.display = "flex";

    const res = await fetch(CONFIG.URL);
    const data = await res.json();

    STATE.raw = data;
    draw(data);

    $("loading").style.display = "none";
  };

  // ================= RANGE =================
  const setRange = (type) => {
    const now = new Date();
    let start = new Date();

    if (type === "today") start.setHours(0,0,0,0);
    if (type === "7") start.setDate(now.getDate()-7);
    if (type === "30") start.setDate(now.getDate()-30);

    $("startDate").value = start.toISOString().split("T")[0];
    $("endDate").value = now.toISOString().split("T")[0];

    applyRange();
  };

  const applyRange = () => {
    const s = new Date($("startDate").value).getTime();
    const e = new Date($("endDate").value).getTime();

    const out = {};
    for (const d in STATE.raw) {
      const t = new Date(d).getTime();
      if (t >= s && t <= e) out[d] = STATE.raw[d];
    }

    draw(out);
  };

  // ================= DRAW =================
  const draw = (data) => {

    let pt = {}, dt = {}, total = 0;
    const dates = Object.keys(data || {}).sort();

    for (const d of dates) {
      dt[d] = 0;

      for (const p in data[d]) {
        const v = Number(data[d][p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5 = sorted.slice(0,5);

    // KPI
    animateKPI($("sales"), total);
    if ($("products")) $("products").textContent = sorted.length;
    if ($("top")) $("top").textContent = top5[0] || "-";

    // TOP LIST
    if ($("homeTopList")) {
      $("homeTopList").innerHTML =
        top5.map((p,i)=>`${i+1}. ${p} (£${pt[p].toFixed(2)})`).join("<br>");
    }

    // TABLE
    if ($("productTable")) {
      $("productTable").innerHTML =
        sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");
    }

    // BAR CHART (STACKED + COLOURS RESTORED)
    if (STATE.barChart) STATE.barChart.destroy();

    STATE.barChart = new Chart($("barChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: top5.map((p,i)=>({
          label: p,
          data: dates.map(d=>data[d]?.[p]||0),
          backgroundColor: `hsl(${i*60},70%,55%)`
        }))
      },
      options: {
        responsive:true,
        scales: {
          x: { stacked:true },
          y: { stacked:true }
        }
      }
    });

    // SALES CHART
    if (STATE.salesChart) STATE.salesChart.destroy();

    STATE.salesChart = new Chart($("salesChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: [{
          label: "Sales",
          data: dates.map(d=>dt[d]||0)
        }]
      }
    });
  };

  // ================= TABS =================
  const switchTab = (i,el) => {
    $("tabs").style.transform = `translateX(-${i*100}%)`;
    document.querySelectorAll(".nav div")
      .forEach(b=>b.classList.remove("active"));
    if (el) el.classList.add("active");
  };

  return {login,setRange,applyRange,switchTab};

})();

window.App = App;

</script>

</body>
</html>
