<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui, Arial;
  background:#0b1220;
  color:#e5e7eb;
}

.wrap{
  padding:16px;
  max-width:900px;
  margin:auto;
}

h2{
  margin:10px 0;
}

/* INPUTS */
input,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:none;
}

input{
  background:#111827;
  color:white;
}

button{
  background:#2563eb;
  color:white;
  font-weight:600;
}

/* CARDS */
.tiles{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

.tile{
  background:#111827;
  padding:14px;
  border-radius:14px;
  text-align:center;
}

.tile div:first-child{
  font-size:12px;
  opacity:0.7;
}

.tile div:last-child{
  font-size:18px;
  font-weight:600;
}

/* CHART */
canvas{
  margin-top:16px;
  background:#111827;
  border-radius:14px;
  padding:10px;
}

/* LIST */
#list{
  margin-top:14px;
  background:#111827;
  border-radius:14px;
  padding:12px;
}

#list div{
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid #1f2937;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top:10px;opacity:0.7">Loading...</div>
</div>

<div class="wrap">

<h2>📊 Sales Dashboard</h2>

<input type="date" id="start">
<input type="date" id="end">
<button onclick="loadData()">Load Data</button>

<div class="tiles">
  <div class="tile">
    <div>Sales</div>
    <div id="salesEl">£0</div>
  </div>

  <div class="tile">
    <div>Orders</div>
    <div id="ordersEl">0</div>
  </div>

  <div class="tile">
    <div>Top</div>
    <div id="topEl">-</div>
  </div>
</div>

<canvas id="chart"></canvas>

<div id="list"></div>

</div>

<script>

let chart;

async function loadData(){

  document.getElementById("loader").style.display="flex";

  let url="https://script.google.com/macros/s/AKfycbxOIPkcA0sy4rFRVutaNQtdjkx2YkYmf7xIqlKUpdBo4Vv6Xy5KtvBpyB9FQtmIzsEALw/exec?start="
    + start.value + "&end=" + end.value;

  try{

    let res = await fetch(url);
