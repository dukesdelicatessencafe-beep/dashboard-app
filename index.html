<script>
alert("SCRIPT IS RUNNING");

const App = {

  state: {
    RAW: {},
    barChart: null,
    salesChart: null
  },

  config: {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    password: "1234"
  },

  ui: {},

  /* INIT */
  init() {
    this.cacheDOM();
    this.guardDOM();
    this.safeBoot();
    this.initGestures();
  },

  /* CACHE DOM */
  cacheDOM() {
    this.ui = {
      login: document.getElementById("login"),
      app: document.getElementById("app"),
      pass: document.getElementById("pass"),

      container: document.getElementById("container"),

      sales: document.getElementById("sales"),
      products: document.getElementById("products"),
      top: document.getElementById("top"),
      insights: document.getElementById("insights"),
      table: document.getElementById("table"),

      startDate: document.getElementById("startDate"),
      endDate: document.getElementById("endDate"),

      barChartCanvas: document.getElementById("barChart"),
      salesChartCanvas: document.getElementById("salesChart")
    };
  },

  /* HARD FAIL DETECTION */
  guardDOM() {
    const required = ["login", "app", "pass"];

    const missing = required.filter(k => !this.ui[k]);

    if (missing.length) {
      console.error("MISSING DOM ELEMENTS:", missing);
      document.body.innerHTML =
        "<h2 style='color:red;font-family:Arial'>ERROR: Missing HTML elements: " +
        missing.join(", ") +
        "</h2>";
      throw new Error("DOM missing: " + missing.join(", "));
    }
  },

  /* SAFE BOOT */
  safeBoot() {
    if (this.ui.login) this.ui.login.style.display = "flex";
    if (this.ui.app) this.ui.app.style.display = "none";
  },

  /* LOGIN */
  login() {

    const pass = this.ui.pass;
    const login = this.ui.login;
    const app = this.ui.app;

    if (!pass || !login || !app) {
      console.error("LOGIN FAIL - UI MISSING", this.ui);
      alert("UI missing elements (check HTML IDs)");
      return;
    }

    if (pass.value === this.config.password) {
      login.style.display = "none";
      app.style.display = "block";
      this.load();
    } else {
      alert("Wrong password");
    }
  },

  /* LOAD API */
  async load() {
    try {

      const res = await fetch(this.config.URL);

      if (!res.ok) {
        throw new Error("Network error: " + res.status);
      }

      const text = await res.text();

      if (!text || text.includes("<!DOCTYPE")) {
        throw new Error("Invalid API response (HTML returned)");
      }

      const data = JSON.parse(text);

      this.state.RAW = data;
      this.draw(data);

    } catch (e) {
      console.error("LOAD ERROR:", e);
      alert("Load failed - check API");
    }
  },

  /* DRAW */
  draw(data) {

    if (!this.ui.barChartCanvas || !this.ui.salesChartCanvas) {
      console.error("Charts missing in HTML");
      return;
    }

    let pt = {}, dt = {}, total = 0;

    let dates = Object.keys(data || {}).sort();

    for (let d of dates) {
      let day = data[d] || {};
      dt[d] = 0;

      for (let p in day) {
        let v = Number(day[p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    let sorted = Object.keys(pt).sort((a, b) => pt[b] - pt[a]);
    let top5 = sorted.slice(0, 5);

    if (this.ui.sales) this.ui.sales.innerText = "£" + total.toFixed(2);
    if (this.ui.products) this.ui.products.innerText = sorted.length;
    if (this.ui.top) this.ui.top.innerText = top5[0] || "-";

    let avg = total / (dates.length || 1);
    let anomalies = dates.filter(d => dt[d] > avg * 1.5);

    if (this.ui.insights) {
      this.ui.insights.innerHTML =
        "🏆 Top Products<br>" +
        top5.map(p => "• " + p + " (£" + pt[p].toFixed(2) + ")").join("<br>") +
        "<br><br>⚠️ High Sales Days<br>" +
        (anomalies.length ? anomalies.join("<br>") : "None");
    }

    /* BAR CHART */
    if (this.state.barChart) this.state.barChart.destroy();

    this.state.barChart = new Chart(this.ui.barChartCanvas, {
      type: "bar",
      data: {
        labels: dates,
        datasets: top5.map(p => ({
          label: p,
          data: dates.map(d => data[d]?.[p] || 0),
          stack: "s"
        }))
      },
      options: { responsive: true, maintainAspectRatio: false }
    });

    /* SALES CHART */
    if (this.state.salesChart) this.state.salesChart.destroy();

    this.state.salesChart = new Chart(this.ui.salesChartCanvas, {
      type: "bar",
      data: {
        labels: dates,
        datasets: [{
          label: "Sales (£)",
          data: dates.map(d => dt[d] || 0),
          backgroundColor: "#38bdf8"
        }]
      }
    });

    /* TABLE */
    if (this.ui.table) {
      this.ui.table.innerHTML =
        sorted.map(p =>
          `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`
        ).join("");
    }
  },

  /* LOGIN FILTER */
  applyFilter() {
    let s = new Date(this.ui.startDate?.value || 0).getTime();
    let e = new Date(this.ui.endDate?.value || 9999999999999).getTime();

    let out = {};

    for (let d in this.state.RAW) {
      let t = new Date(d).getTime();
      if (t >= s && t <= e) out[d] = this.state.RAW[d];
    }

    this.draw(out);
  },

  /* INIT */
  initGestures() {
    const c = this.ui.container;
    if (!c) return;

    let startX = 0;

    c.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    });

    c.addEventListener("touchend", e => {
      let diff = e.changedTouches[0].clientX - startX;

      if (diff > 80) console.log("swipe right");
      if (diff < -80) console.log("swipe left");
    });
  }

};

/* START */
document.addEventListener("DOMContentLoaded", () => {
  App.init();
});

/* GLOBALS */
function login() {
  App.login();
}
</script>
