<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="icon" href="./icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Hardened Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#app{display:none;height:100vh}

#container{
  height:calc(100vh - 55px);
  overflow-y:auto;
  padding:12px;
}

.tab{display:none}
.tab.active{display:block}

.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.dateBar{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

.chartBox{height:260px}

canvas{
  width:100%!important;
  height:260px!important;
}

#insights{
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}

.nav{
  height:55px;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.nav .active{background:#38bdf8}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="./icon.png" style="width:90px;height:90px;margin-bottom:10px">
  <input id="pass" type="password" placeholder="Password"
    style="padding:10px;border-radius:8px;border:none">
  <br><br>
  <button id="loginBtn" style="padding:10px;background:#38bdf8">
    Login
  </button>
</div>

<!-- APP -->
<div id="app">
  <div id="container">

    <div class="tab active" id="tab1">

      <div class="dateBar">
        <input id="startDate" type="date">
        <input id="endDate" type="date">
      </div>

      <div class="tiles">
        <div class="tile">Sales<br><b id="sales">£0</b></div>
        <div class="tile">Products<br><b id="products">0</b></div>
        <div class="tile">Top<br><b id="top">-</b></div>
      </div>

      <div id="insights"></div>

      <div class="chartBox">
        <canvas id="barChart"></canvas>
      </div>

    </div>

    <div class="tab" id="tab2">
      <table id="table" width="100%"></table>
    </div>

    <div class="tab" id="tab3">
      <div class="chartBox">
        <canvas id="salesChart"></canvas>
      </div>
    </div>

  </div>

  <div class="nav">
    <div data-tab="1">📊</div>
    <div data-tab="2">📦</div>
    <div data-tab="3">📈</div>
  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

/* SAFE DOM CACHE (NO GLOBAL RELIANCE) */
const $ = (id) => document.getElementById(id);

const UI = {
  login: $("login"),
  app: $("app"),
  pass: $("pass"),
  sales: $("sales"),
  products: $("products"),
  top: $("top"),
  insights: $("insights"),
  table: $("table"),
  barCanvas: $("barChart"),
  salesCanvas: $("salesChart"),
  container: $("container"),
  loginBtn: $("loginBtn")
};

let RAW = {};
let barChart = null;
let salesChart = null;

/* SAFE LOGIN */
UI.loginBtn.onclick = () => {
  if (UI.pass.value.trim() === "1234") {
    UI.login.style.display = "none";
    UI.app.style.display = "block";
    load();
  } else {
    alert("Wrong password");
  }
};

/* SAFE LOAD */
async function load(){
  try {
    const res = await fetch(URL);

    if(!res.ok){
      throw new Error("Network error: " + res.status);
    }

    const text = await res.text();

    if(!text.trim().startsWith("{")){
      throw new Error("Invalid JSON response");
    }

    RAW = JSON.parse(text);
    draw(RAW);

  } catch(err){
    console.error("LOAD FAILED:", err);
    alert("Data load failed");
  }
}

/* SAFE DRAW PIPELINE */
function draw(data){

  if(!data || typeof data !== "object") return;

  const pt = {};
  const dt = {};
  let total = 0;

  const dates = Object.keys(data).sort();

  for(const d of dates){
    dt[d] = 0;

    for(const p in data[d]){
      const v = Number(data[d][p]) || 0;
      pt[p] = (pt[p] || 0) + v;
      dt[d] += v;
      total += v;
    }
  }

  const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
  const top5 = sorted.slice(0,5);

  /* UI SAFE UPDATES */
  UI.sales.innerText = "£" + total.toFixed(2);
  UI.products.innerText = sorted.length;
  UI.top.innerText = top5[0] || "-";

  UI.insights.innerHTML =
    "🏆 Top Products<br>" +
    top5.map(p => `• ${p} (£${pt[p].toFixed(2)})`).join("<br>");

  /* SAFE TABLE */
  UI.table.innerHTML =
    sorted.map(p => `<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

  /* SAFE BAR CHART */
  try {
    if(barChart) barChart.destroy();

    barChart = new Chart(UI.barCanvas, {
      type:"bar",
      data:{
        labels:dates,
        datasets: top5.map(p => ({
          label:p,
          data:dates.map(d => data[d]?.[p] || 0),
          stack:"s"
        }))
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        scales:{x:{stacked:true},y:{stacked:true}}
      }
    });

  } catch(e){
    console.error("BAR CHART ERROR", e);
  }

  /* SAFE SALES CHART */
  try {
    if(salesChart) salesChart.destroy();

    salesChart = new Chart(UI.salesCanvas, {
      type:"bar",
      data:{
        labels:dates,
        datasets:[{
          label:"Sales (£)",
          data:dates.map(d => dt[d]),
          backgroundColor:"#38bdf8"
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
          tooltip:{
            callbacks:{
              label:c=>"£"+c.raw.toFixed(2)
            }
          }
        }
      }
    });

  } catch(e){
    console.error("SALES CHART ERROR", e);
  }
}

/* SAFE TAB SWITCH */
UI.container.addEventListener("click",(e)=>{
  const tab = e.target.dataset.tab;
  if(!tab) return;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  $("tab"+tab).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
});

</script>

</body>
</html>
