<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:999;
  pointer-events:none;
}

.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input,button{
  padding:10px;
  margin:5px;
}

/* WRAP */
.wrap{
  padding:10px;
  overflow-x:hidden;
}

/* SLIDER */
.slider{
  display:flex;
  width:300vw;
  transition:transform 0.35s ease;
  will-change:transform;
}

.section{
  width:100vw;
  flex-shrink:0;
  box-sizing:border-box;
  overflow:hidden;
  padding:10px;
}

/* TILES */
.tiles{
  display:flex;
  gap:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  padding:10px;
  text-align:center;
}

.nav .active{
  background:#38bdf8;
}

/* TABLE */
table{
  width:100%;
}

td{
  padding:6px;
  border-bottom:1px solid #334155;
}

/* CHART FIX */
.chartBox{
  width:100%;
  height:240px;
  position:relative;
  overflow:hidden;
  max-width:100vw;
}

canvas{
  width:100% !important;
  height:240px !important;
  max-width:100% !important;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="loader"></div>
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="wrap">

<input type="date" id="start">
<input type="date" id="end">
<button onclick="load()">Load</button>

<div id="slider" class="slider">

  <!-- TAB 1 -->
  <div class="section">
    <div class="tiles">
      <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
      <div class="tile"><div>Products</div><div id="orders">0</div></div>
      <div class="tile"><div>Top</div><div id="top">-</div></div>
    </div>

    <div class="chartBox">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <!-- TAB 2 -->
  <div class="section">
    <div id="tableArea"></div>
  </div>

  <!-- TAB 3 -->
  <div class="section">
    <div class="chartBox">
      <canvas id="lineChart"></canvas>
    </div>
  </div>

</div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goTo(0,this)" class="active">📊</div>
  <div onclick="goTo(1,this)">📦</div>
  <div onclick="goTo(2,this)">📈</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let barChart, lineChart;

const login = document.getElementById("login");
const app = document.getElementById("app");
const pw = document.getElementById("pw");
const start = document.getElementById("start");
const end = document.getElementById("end");
const slider = document.getElementById("slider");

/* =========================
   SAFE STARTUP (FIXED)
========================= */
window.addEventListener("DOMContentLoaded", () => {
  try {

    let today = new Date().toISOString().split("T")[0];
    start.value = today;
    end.value = today;

    if (localStorage.getItem("login")) {
      login.style.display = "none";
      app.style.display = "block";
      load();
    }

  } catch (e) {
    console.log("Startup error:", e);
  } finally {
    document.getElementById("splash").style.display = "none";
  }
});

/* LOGIN */
function check(){
  if(pw.value==="1234"){
    localStorage.setItem("login","1");
    login.style.display="none";
    app.style.display="block";
    load();
  }
}

/* NAV */
function goTo(i,el){
  slider.style.transform = `translateX(-${i * 100}vw)`;

  document.querySelectorAll(".nav div")
    .forEach(n=>n.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    if(barChart){ barChart.resize(); barChart.update(); }
    if(lineChart){ lineChart.resize(); lineChart.update(); }
  }, 250);
}

/* LOAD (SAFE) */
async function load(){

  try{

    let url = SCRIPT_URL + "?start="+start.value+"&end="+end.value;

    let res = await fetch(url);

    if(!res.ok) throw new Error("HTTP error " + res.status);

    let map = await res.json();

    localStorage.setItem("lastData", JSON.stringify(map));

    draw(map);

  }catch(err){

    console.log("Load failed:", err);

    let fallback = localStorage.getItem("lastData");

    if(fallback){
      draw(JSON.parse(fallback));
    } else {
      alert("Failed to load data from server");
    }

  }
}

/* DRAW */
function draw(map){

  let productTotals = {};
  let dailyTotals = {};
  let dates = Object.keys(map).sort();

  let sales = 0;

  for(let d in map){
    dailyTotals[d] = 0;

    for(let p in map[d]){
      let v = Number(map[d][p]) || 0;

      productTotals[p] = (productTotals[p] || 0) + v;
      dailyTotals[d] += v;
      sales += v;
    }
  }

  let sorted = Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top5 = sorted.slice(0,5);

  document.getElementById("sales").innerText = "£" + sales.toFixed(2);
  document.getElementById("orders").innerText = sorted.length;
  document.getElementById("top").innerText = top5[0] || "-";

  /* BAR */
  if(barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{
      labels: dates,
      datasets: top5.map(p => ({
        label:p,
        data: dates.map(d => map[d][p] || 0),
        stack:'s'
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      }
    }
  });

  /* LINE */
  if(lineChart) lineChart.destroy();

  lineChart = new Chart(document.getElementById("lineChart"),{
    type:'line',
    data:{
      labels: dates,
      datasets:[{
        label:"Sales",
        data: dates.map(d => dailyTotals[d])
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

  /* TABLE */
  let html="<table>";
  sorted.forEach(p=>{
    html += `<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  });
  html+="</table>";

  document.getElementById("tableArea").innerHTML = html;
}

</script>

</body>
</html>
