<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* ======================
   LOGIN SCREEN
====================== */

#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:#0f172a;
}

#login img{
  width:90px;
  height:90px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  animation:pop 0.6s ease-out;
}

@keyframes pop{
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

#login input{
  width:100%;
  max-width:280px;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

#login button{
  width:100%;
  max-width:280px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  font-weight:bold;
}

/* ======================
   APP WRAP
====================== */

.wrap{
  padding:12px;
  padding-bottom:70px;
}

/* DATE */
.dateBar{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

.dateBar button{
  padding:8px 10px;
  border-radius:8px;
  border:none;
  background:#38bdf8;
  color:#000;
  font-weight:bold;
}

/* PRESETS */
.presetRow{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.presetBtn{
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:12px;
}

/* INSIGHTS */
#insights{
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
  font-size:13px;
  line-height:1.4;
}

/* TABS */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#1e293b;
  height:55px;
}

.nav div{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.nav .active{
  background:#38bdf8;
}

/* TILES */
.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
}

/* CHART */
.chartBox{
  width:100%;
  height:260px;
}

canvas{
  width:100% !important;
  height:260px !important;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
  font-size:14px;
}

/* PULL */
#pull{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  text-align:center;
  color:#38bdf8;
  font-size:14px;
  z-index:999;
}
</style>

</head>

<body>

<!-- ======================
     LOGIN SCREEN
====================== -->

<div id="login">
  <img src="icon.png">
  <h2>Sales Dashboard</h2>

  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ======================
     APP
====================== -->

<div id="app" style="display:none;">

<div id="pull">↓ Pull to refresh</div>

<div class="wrap">

<!-- TAB 1 -->
<div id="tab1" class="tab active">

  <div class="dateBar">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="applyFilter()">Go</button>
  </div>

  <div class="presetRow">
    <button class="presetBtn" onclick="setRange('today')">Today</button>
    <button class="presetBtn" onclick="setRange('7')">7 Days</button>
    <button class="presetBtn" onclick="setRange('30')">Month</button>
  </div>

  <div class="tiles">
    <div class="tile">Sales<br><b id="sales">£0</b></div>
    <div class="tile">Products<br><b id="products">0</b></div>
    <div class="tile">Top<br><b id="top">-</b></div>
  </div>

  <div id="insights">Loading insights...</div>

  <div class="chartBox">
    <canvas id="barChart"></canvas>
  </div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <table id="table"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="chartBox">
    <canvas id="lineChart"></canvas>
  </div>
</div>

</div>

<div class="nav">
  <div onclick="switchTab(1,this)" class="active">📊</div>
  <div onclick="switchTab(2,this)">📦</div>
  <div onclick="switchTab(3,this)">📈</div>
</div>

</div>

<script>

/* ======================
   LOGIN
====================== */

function login(){
  let pass=document.getElementById("pass").value;

  if(pass==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  }else{
    alert("Wrong password");
  }
}

/* ======================
   DATA
====================== */

const URL="https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let RAW_DATA={},FILTERED_DATA={},barChart,lineChart;

/* ======================
   LOAD
====================== */

async function load(){
  let res=await fetch(URL);
  let data=await res.json();

  RAW_DATA=data;
  FILTERED_DATA=data;

  draw(data);
}

/* ======================
   FILTER
====================== */

function applyFilter(){

  let s=document.getElementById("startDate").value;
  let e=document.getElementById("endDate").value;

  if(!s||!e){draw(RAW_DATA);return;}

  let out={};
  let a=new Date(s).getTime();
  let b=new Date(e).getTime();

  for(let d in RAW_DATA){
    let t=new Date(d).getTime();
    if(t>=a&&t<=b)out[d]=RAW_DATA[d];
  }

  draw(out);
}

/* ======================
   PRESETS
====================== */

function setRange(t){

  let e=new Date();
  let s=new Date();

  if(t==="7")s.setDate(e.getDate()-7);
  if(t==="30")s.setDate(e.getDate()-30);

  document.getElementById("startDate").value=format(s);
  document.getElementById("endDate").value=format(e);

  applyFilter();
}

function format(d){
  return d.toISOString().split("T")[0];
}

/* ======================
   DRAW
====================== */

function draw(data){

  let productTotals={},dailyTotals={},total=0;
  let dates=Object.keys(data).sort();

  for(let d of dates){
    dailyTotals[d]=0;

    for(let p in data[d]){
      let v=Number(data[d][p])||0;
      productTotals[p]=(productTotals[p]||0)+v;
      dailyTotals[d]+=v;
      total+=v;
    }
  }

  let sorted=Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top5=sorted.slice(0,5);

  document.getElementById("sales").innerText="£"+total.toFixed(2);
  document.getElementById("products").innerText=sorted.length;
  document.getElementById("top").innerText=top5[0]||"-";

  buildInsights(productTotals,dailyTotals,dates);

  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d][p]||0),
        stack:"s"
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      },
      plugins:{
        tooltip:{
          callbacks:{
            label:c=>"£"+c.raw.toFixed(2)
          }
        }
      }
    }
  });

  if(lineChart)lineChart.destroy();
  lineChart=new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales",
        data:dates.map(d=>dailyTotals[d])
      }]
    },
    options:{
      plugins:{
        tooltip:{
          callbacks:{
            label:c=>"£"+c.raw.toFixed(2)
          }
        }
      }
    }
  });

  let html="";
  for(let p of sorted){
    html+=`<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  }
  document.getElementById("table").innerHTML=html;
}

/* ======================
   INSIGHTS
====================== */

function buildInsights(productTotals,dailyTotals,dates){

  let html="";

  let sorted=Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top3=sorted.slice(0,3);

  html+="🏆 <b>Best Sellers</b><br>";
  top3.forEach(p=>{
    html+=`• ${p} (£${productTotals[p].toFixed(2)})<br>`;
  });

  let best=dates.reduce((a,b)=>dailyTotals[a]>dailyTotals[b]?a:b,dates[0]);

  html+="<br>📈 <b>Best Day</b><br>";
  html+=`• ${best} (£${dailyTotals[best].toFixed(2)})<br><br>`;

  let avg=Object.values(dailyTotals).reduce((a,b)=>a+b,0)/dates.length;

  let anomalies=dates.filter(d=>dailyTotals[d]>avg*1.5);

  html+="⚠️ <b>Anomalies</b><br>";

  html+=anomalies.length?
    anomalies.map(d=>`• ${d} (£${dailyTotals[d].toFixed(2)})<br>`).join("")
    :"• None detected<br>";

  document.getElementById("insights").innerHTML=html;
}

/* ======================
   TABS
====================== */

function switchTab(n,el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    if(barChart)barChart.resize();
    if(lineChart)lineChart.resize();
  },100);
}

/* ======================
   INIT
====================== */

if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
