<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
}

/* INPUTS */
input,button{
  padding:12px;
  border-radius:10px;
  border:none;
}

input{background:#0b1220;color:white;}
button{background:#38bdf8;font-weight:bold;}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow:hidden;
}

/* TABS */
.tabs{
  display:flex;
  width:100%;
  height:calc(100vh - 70px);
  transition:transform .35s ease;
}

.tab{
  min-width:100%;
  padding:12px;
  overflow:auto;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  background:#0b1220;
  border-top:1px solid #1e293b;
}

.nav div{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:12px;
}

.nav .active{color:#38bdf8;}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}

/* DATE */
.dates{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.dates input{flex:1;}

/* CHART */
canvas{
  background:#1e293b;
  border-radius:12px;
  margin-top:10px;
  max-height:280px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
}

/* LOADER */
#loading{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  z-index:999;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  opacity:0;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <div class="tabs" id="tabs">

    <!-- HOME -->
    <div class="tab">

      <div class="grid">
        <div class="card">Sales<br><b id="sales">£0</b></div>
        <div class="card">Products<br><b id="products">0</b></div>
        <div class="card">Top<br><b id="top">-</b></div>
      </div>

      <div class="dates">
        <input id="startDate" type="date">
        <input id="endDate" type="date">
        <button onclick="App.applyRange()">Apply</button>
        <button onclick="App.setRange('today')">Today</button>
        <button onclick="App.setRange('7')">7D</button>
        <button onclick="App.setRange('30')">30D</button>
      </div>

      <div style="margin-top:10px;background:#1e293b;padding:10px;border-radius:12px;">
        <b>Top Products</b>
        <div id="homeTopList">-</div>
      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- STATS -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights"></div>
    </div>

    <!-- PRODUCTS -->
    <div class="tab">
      <table id="productTable"></table>
    </div>

  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div onclick="App.switchTab(0,this)" class="active">🏠<small>Home</small></div>
  <div onclick="App.switchTab(1,this)">📈<small>Stats</small></div>
  <div onclick="App.switchTab(2,this)">📦<small>Products</small></div>
</div>

<div id="toast"></div>

<script>
const App = (() => {

  const CONFIG = {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    PASSWORD: "1234"
  };

  const STATE = {
    raw: {},
    barChart: null,
    salesChart: null
  };

  const $ = id => document.getElementById(id);
  const fmt = v => "£" + Number(v || 0).toFixed(2);

  const animate = (el, val) => {
    let start = 0;
    const step = val / 20;
    const i = setInterval(()=>{
      start += step;
      if(start >= val){ start = val; clearInterval(i); }
      el.textContent = fmt(start);
    },20);
  };

  const toast = msg => {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
  };

  const login = () => {
    if ($("pass").value !== CONFIG.PASSWORD) return toast("Wrong password");
    $("login").style.display="none";
    $("app").style.display="block";
    load();
  };

  const load = async () => {
    $("loading").style.display="flex";
    try{
      const res = await fetch(CONFIG.URL);
      STATE.raw = await res.json();
      draw(STATE.raw);
    }catch{
      toast("Load failed");
    }
    $("loading").style.display="none";
  };

  const setRange = type => {
    const now = new Date();
    let start = new Date();
    if(type==="today") start.setHours(0,0,0,0);
    if(type==="7") start.setDate(now.getDate()-7);
    if(type==="30") start.setDate(now.getDate()-30);
    $("startDate").value = start.toISOString().split("T")[0];
    $("endDate").value = now.toISOString().split("T")[0];
    applyRange();
  };

  const applyRange = () => {
    const s = new Date($("startDate").value+"T00:00:00").getTime();
    const e = new Date($("endDate").value+"T23:59:59").getTime();
    const out = {};
    for(const d in STATE.raw){
      const t = new Date(d).getTime();
      if(t>=s && t<=e) out[d]=STATE.raw[d];
    }
    draw(out);
  };

  const draw = data => {

    let pt={}, dt={}, total=0;
    const dates = Object.keys(data||{}).sort();

    for(const d of dates){
      dt[d]=0;
      for(const p in data[d]){
        const v=Number(data[d][p]||0);
        pt[p]=(pt[p]||0)+v;
        dt[d]+=v;
        total+=v;
      }
    }

    const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5 = sorted.slice(0,5);

    animate($("sales"), total);
    $("products").textContent = sorted.length;
    $("top").textContent = top5[0] || "-";

    $("homeTopList").innerHTML =
      top5.map((p,i)=>`${i+1}. ${p} — ${fmt(pt[p])}`).join("<br>");

    $("productTable").innerHTML =
      sorted.map(p=>`<tr><td>${p}</td><td>${fmt(pt[p])}</td></tr>`).join("");

    if(STATE.barChart) STATE.barChart.destroy();
    STATE.barChart = new Chart($("barChart"),{
      type:"bar",
      data:{
        labels:dates,
        datasets:top5.map(p=>({
          label:p,
          data:dates.map(d=>data[d]?.[p]||0),
          stack:"s"
        }))
      },
      options:{
        scales:{
          x:{stacked:true},
          y:{stacked:true,ticks:{callback:v=>"£"+v}}
        }
      }
    });

    if(STATE.salesChart) STATE.salesChart.destroy();
    STATE.salesChart = new Chart($("salesChart"),{
      type:"bar",
      data:{
        labels:dates,
        datasets:[{label:"Sales (£)",data:dates.map(d=>dt[d]||0)}]
      }
    });
  };

  const switchTab = (i,el)=>{
    $("tabs").style.transform=`translateX(-${i*100}%)`;
    document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
  };

  return {login,load,setRange,applyRange,switchTab};

})();
window.App = App;
</script>

</body>
</html>
