<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* TOP PADDING SAFE AREA */
.wrap{
  padding:12px;
  padding-bottom:70px;
}

/* PULL REFRESH */
#pull{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  text-align:center;
  color:#38bdf8;
  font-size:14px;
}

/* TABS */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#1e293b;
  height:55px;
}

.nav div{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.nav .active{
  background:#38bdf8;
}

/* TILES */
.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
}

/* CHART FIX (NO OVERFLOW EVER) */
.chartBox{
  width:100%;
  height:260px;
}

/* IMPORTANT: prevents Chart.js overflow */
canvas{
  width:100% !important;
  height:260px !important;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
  font-size:14px;
}
</style>
</head>

<body>

<div id="pull">↓ Pull to refresh</div>

<div class="wrap">

<!-- TAB 1 -->
<div id="tab1" class="tab active">

  <div class="tiles">
    <div class="tile">Sales<br><b id="sales">£0</b></div>
    <div class="tile">Products<br><b id="products">0</b></div>
    <div class="tile">Top<br><b id="top">-</b></div>
  </div>

  <div class="chartBox">
    <canvas id="barChart"></canvas>
  </div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <table id="table"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="chartBox">
    <canvas id="lineChart"></canvas>
  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab(1,this)" class="active">📊</div>
  <div onclick="switchTab(2,this)">📦</div>
  <div onclick="switchTab(3,this)">📈</div>
</div>

<script>

/* ======================
   CONFIG
====================== */

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

/* ======================
   STATE
====================== */

let barChart, lineChart;
let currentTab = 1;

/* ======================
   LOAD DATA
====================== */

async function load(){

  try{

    let res = await fetch(URL);
    let data = await res.json();

    draw(data);

  }catch(e){
    console.log("Load error",e);
  }
}

/* ======================
   DRAW DASHBOARD
====================== */

function draw(data){

  let productTotals = {};
  let dailyTotals = {};
  let totalSales = 0;

  let dates = Object.keys(data).sort();

  for(let d of dates){

    dailyTotals[d] = 0;

    for(let p in data[d]){

      let v = Number(data[d][p]) || 0;

      productTotals[p] = (productTotals[p] || 0) + v;

      dailyTotals[d] += v;

      totalSales += v;
    }
  }

  let sortedProducts = Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top5 = sortedProducts.slice(0,5);

  /* TILE DATA */
  document.getElementById("sales").innerText = "£" + totalSales.toFixed(2);
  document.getElementById("products").innerText = sortedProducts.length;
  document.getElementById("top").innerText = top5[0] || "-";

  /* ======================
     BAR CHART (STACKED)
  ====================== */

  if(barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d][p] || 0),
        stack:"s"
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      }
    }
  });

  /* ======================
     LINE CHART
  ====================== */

  if(lineChart) lineChart.destroy();

  lineChart = new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales",
        data:dates.map(d=>dailyTotals[d])
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

  /* ======================
     TABLE
  ====================== */

  let html = "";

  for(let p of sortedProducts){
    html += `<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  }

  document.getElementById("table").innerHTML = html;
}

/* ======================
   TAB SWITCH
====================== */

function switchTab(n,el){

  currentTab = n;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    if(barChart) barChart.resize();
    if(lineChart) lineChart.resize();
  },100);
}

/* ======================
   SERVICE WORKER
====================== */

if("serviceWorker" in navigator){

  navigator.serviceWorker.register("sw.js");

  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    location.reload();
  });
}

/* ======================
   INITIAL LOAD
====================== */

load();

/* ======================
   PULL TO REFRESH (ELASTIC)
====================== */

let startY=0;
let pulling=false;

document.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchmove",e=>{

  let dy = e.touches[0].clientY - startY;

  if(window.scrollY < 5 && dy > 20){
    pulling = true;
    document.getElementById("pull").style.top = Math.min(dy-60,30) + "px";
  }
});

document.addEventListener("touchend",()=>{

  if(pulling){
    document.getElementById("pull").style.top = "-60px";
    load();
  }

  pulling = false;
});

</script>

</body>
</html>
