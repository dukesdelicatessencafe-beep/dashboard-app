<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* SPLASH */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* WRAP */
.wrap {
  padding:12px;
  padding-bottom:70px;
  position:relative;
}

/* SLIDE CONTAINER */
.slider {
  display:flex;
  width:300%;
  transition:0.3s;
}

.section {
  width:100%;
  flex-shrink:0;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111827;
}

.nav div {
  flex:1;
  text-align:center;
  padding:10px;
}

.nav .active {
  background:#3b82f6;
}

/* KPI */
.tiles {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.tile {
  background:#1f2937;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
}

canvas {
  margin-top:15px;
  background:#111827;
  border-radius:12px;
  padding:10px;
}
</style>
</head>

<body>

<div id="splash">Loading...</div>

<!-- LOGIN -->
<div id="login" style="text-align:center;margin-top:120px;">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="wrap">

<input type="date" id="start">
<input type="date" id="end">

<div id="slider" class="slider">

<!-- DASHBOARD -->
<div class="section">
  <div class="tiles">
    <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
    <div class="tile"><div>Orders</div><div id="orders">0</div></div>
    <div class="tile"><div>Top</div><div id="top">-</div></div>
  </div>
  <canvas id="barChart"></canvas>
</div>

<!-- PRODUCTS -->
<div class="section">
  <div id="tableArea"></div>
</div>

<!-- TRENDS -->
<div class="section">
  <canvas id="lineChart"></canvas>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goTo(0,this)" class="active">📊</div>
  <div onclick="goTo(1,this)">📦</div>
  <div onclick="goTo(2,this)">📈</div>
</div>

<script>

let index=0;
let startX=0;

const PASSWORDS=["1234","staff1","staff2"];

function check(){
  if(PASSWORDS.includes(pw.value)){
    localStorage.setItem("login","1");
    showApp();
  }else alert("Wrong");
}

function showApp(){
  login.style.display="none";
  app.style.display="block";
  load();
}

window.onload=()=>{
  let today=new Date().toISOString().split("T")[0];
  start.value=today;
  end.value=today;

  if(localStorage.getItem("login")) showApp();

  setTimeout(()=>splash.style.display="none",500);
};

start.onchange=load;
end.onchange=load;

/* NAV CLICK */
function goTo(i,el){
  index=i;
  slider.style.transform="translateX(-"+(i*100)+"%)";

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}

/* SWIPE */
slider.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

slider.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;

  if(diff>50 && index>0) index--;
  if(diff<-50 && index<2) index++;

  slider.style.transform="translateX(-"+(index*100)+"%)";

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  document.querySelectorAll(".nav div")[index].classList.add("active");
});

/* LOAD DATA */
async function load(){
  let url="https://script.google.com/macros/s/AKfycbxaNoSfFbXI_z1oVXCG4j9AtvNSuokJIQNX7YsDnCMF0Lk57AcAY3lv4gHfFUetgyDRZg/exec?start="+start.value+"&end="+end.value;

  let res=await fetch(url);
  let map=await res.json();

  draw(map);
}

/* DRAW */
function draw(map){

  let totals={},daily={},dates=Object.keys(map).sort();
  let sales=0,orders=0;

  for(let d in map){
    daily[d]=0;
    for(let p in map[d]){
      let v=map[d][p];
      totals[p]=(totals[p]||0)+v;
      daily[d]+=v;
      sales+=v;
      orders++;
    }
  }

  let sorted=Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  let top5=sorted.slice(0,5);

  salesEl.innerText="£"+sales.toFixed(0);
  ordersEl.innerText=orders;
  topEl.innerText=top5[0]||"-";

  let labels=dates.map(d=>new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}));

  new Chart(barChart=document.getElementById("barChart"),{
    type:'bar',
    data:{labels,datasets:top5.map(p=>({label:p,data:dates.map(d=>map[d][p]||0)}))}
  });

  new Chart(lineChart=document.getElementById("lineChart"),{
    type:'line',
    data:{labels,datasets:[{label:"Sales",data:dates.map(d=>daily[d])}]}
  });

  let html="<table>";
  for(let p in totals){
    html+=`<tr><td>${p}</td><td>£${totals[p].toFixed(2)}</td></tr>`;
  }
  html+="</table>";

  tableArea.innerHTML=html;
}

</script>

</body>
</html>
