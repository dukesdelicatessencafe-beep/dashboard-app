<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<title>Dashboard Pro</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#app{display:none;height:100vh}

/* APP */
#container{
  height:calc(100vh - 55px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px;
  max-width:1200px;
  margin:auto;
  position:relative;
}

/* TABS */
.tab{
  opacity:0;
  transform:translateY(10px) scale(0.98);
  pointer-events:none;
  transition:all 220ms ease;
  position:absolute;
  width:100%;
  left:0;
  top:0;
}

.tab.active{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
  position:relative;
}

/* TILES */
.tiles{display:flex;gap:8px}
.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* DATE + PRESETS */
.dateBar{display:flex;gap:8px;flex-wrap:wrap}
.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  min-width:120px;
}

.presetRow{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:6px;
}

.presetBtn{
  flex:1;
  min-width:80px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

/* CHARTS */
.chartBox{
  height:300px;
  background:#0b1220;
  border-radius:10px;
  padding:8px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

/* INSIGHTS */
#insights{
  padding:10px;
  background:#1e293b;
  border-radius:10px;
  margin-top:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:55px;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.nav .active{background:#38bdf8}

/* PULL */
#pull{
  text-align:center;
  height:0;
  overflow:hidden;
  color:#38bdf8;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="./icon.png" style="width:90px;height:90px;margin-bottom:10px">
  <input id="pass" type="password" placeholder="Password"
    style="padding:10px;border-radius:8px;border:none">
  <br><br>
  <button onclick="login()" style="padding:10px;background:#38bdf8">
    Login
  </button>
</div>

<!-- APP -->
<div id="app">

<div id="container">

<div id="pull">⬇ Pull to refresh</div>

<div style="position:relative;">

<!-- TAB 1 -->
<div id="tab1" class="tab active">

<div class="dateBar">
  <input id="startDate" type="date">
  <input id="endDate" type="date">
</div>

<div class="presetRow">
  <button class="presetBtn" onclick="setRange('today')">Today</button>
  <button class="presetBtn" onclick="setRange('7')">7 Days</button>
  <button class="presetBtn" onclick="setRange('30')">Month</button>
</div>

<div class="tiles">
  <div class="tile">Sales<br><b id="sales">£0</b></div>
  <div class="tile">Products<br><b id="products">0</b></div>
  <div class="tile">Top<br><b id="top">-</b></div>
</div>

<div id="insights"></div>

<div class="chartBox">
<canvas id="barChart"></canvas>
</div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
<table id="table" width="100%"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
<div class="chartBox">
<canvas id="salesChart"></canvas>
</div>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="switchTab(1,this)" class="active">📊</div>
<div onclick="switchTab(2,this)">📦</div>
<div onclick="switchTab(3,this)">📈</div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let RAW = {};
let barChart, salesChart;

/* LOGIN SAFE */
function login(){
  const pass=document.getElementById("pass");
  const loginEl=document.getElementById("login");
  const appEl=document.getElementById("app");

  if(pass.value==="1234"){
    loginEl.style.display="none";
    appEl.style.display="block";
    load();
  } else alert("Wrong password");
}

/* LOAD */
async function load(){
  try{
    const res=await fetch(URL);
    RAW=await res.json();
    draw(RAW);
  }catch(e){
    alert("Load failed");
  }
}

/* RANGE */
function setRange(type){

  let e=new Date();
  let s=new Date();

  if(type==="today") s.setHours(0,0,0,0);
  if(type==="7") s.setDate(e.getDate()-7);
  if(type==="30") s.setDate(e.getDate()-30);

  startDate.value=s.toISOString().split("T")[0];
  endDate.value=e.toISOString().split("T")[0];

  applyFilter();
}

/* FILTER */
function applyFilter(){

  let s=new Date(startDate.value).getTime();
  let e=new Date(endDate.value).getTime();

  let out={};

  for(let d in RAW){
    let t=new Date(d).getTime();
    if(t>=s&&t<=e) out[d]=RAW[d];
  }

  draw(out);
}

/* DRAW */
function draw(data){

  let pt={},dt={},total=0;
  let dates=Object.keys(data).sort();

  for(let d of dates){
    dt[d]=0;
    for(let p in data[d]){
      let v=+data[d][p]||0;
      pt[p]=(pt[p]||0)+v;
      dt[d]+=v;
      total+=v;
    }
  }

  let sorted=Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
  let top5=sorted.slice(0,5);

  sales.innerText="£"+total.toFixed(2);
  products.innerText=sorted.length;
  top.innerText=top5[0]||"-";

  insights.innerHTML=
    "🏆 Top Products<br>"+
    top5.map(p=>"• "+p+" (£"+pt[p].toFixed(2)+")").join("<br>");

  if(barChart) barChart.destroy();
  barChart=new Chart(barChartCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d]?.[p]||0),
        stack:"s"
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true}}}
  });

  if(salesChart) salesChart.destroy();
  salesChart=new Chart(salesChartCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales (£)",
        data:dates.map(d=>dt[d]),
        backgroundColor:"#38bdf8"
      }]
    }
  });

  table.innerHTML=
    sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");
}

/* TAB SWITCH */
function switchTab(n,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const tab=document.getElementById("tab"+n);
  void tab.offsetWidth;
  tab.classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* SWIPE */
let startX=0;
container.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

container.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(diff>80) switchTab(1,document.querySelectorAll(".nav div")[0]);
  if(diff<-80) switchTab(3,document.querySelectorAll(".nav div")[2]);
});

/* PULL REFRESH */
let pulling=false;

container.addEventListener("touchmove",e=>{
  if(container.scrollTop===0 && e.touches[0].clientY>80){
    pull.innerText="↻ Release to refresh";
    pulling=true;
  }
});

container.addEventListener("touchend",()=>{
  if(pulling) load();
  pull.innerText="⬇ Pull to refresh";
  pulling=false;
});

/* PWA SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
