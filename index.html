<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="./icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Dashboard Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* APP */
#app{display:none;height:100vh;overflow:hidden}

/* SCROLL AREA */
#container{
  height:calc(100vh - 55px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px;
}

/* TABS */
.tab{display:none}
.tab.active{display:block}

/* TOP BAR */
.tiles{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* DATE */
.dateBar{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.dateBar input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* BUTTONS */
button{
  border:none;
  border-radius:8px;
}

/* CHART */
.chartBox{
  height:260px;
}

/* INSIGHTS */
#insights{
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}

/* NAV */
.nav{
  height:55px;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.nav .active{background:#38bdf8}

/* PULL REFRESH */
#pull{
  text-align:center;
  height:0;
  overflow:hidden;
  color:#38bdf8;
}

/* INSTALL */
#install{
  position:fixed;
  bottom:70px;
  left:10px;
  right:10px;
  background:#38bdf8;
  padding:10px;
  border-radius:10px;
  display:none;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<img src="./icon.png" style="width:90px;height:90px;margin-bottom:10px">
<input id="pass" type="password" placeholder="Password"
style="padding:10px;border-radius:8px;border:none">
<br><br>
<button onclick="login()" style="padding:10px;background:#38bdf8">
Login
</button>
</div>

<!-- APP -->
<div id="app">

<div id="container">

<div id="pull">⬇ Pull to refresh</div>

<!-- TAB 1 -->
<div id="tab1" class="tab active">

<div class="dateBar">
<input type="date" id="startDate">
<input type="date" id="endDate">
</div>

<div class="tiles">
<div class="tile">Sales<br><b id="sales">£0</b></div>
<div class="tile">Products<br><b id="products">0</b></div>
<div class="tile">Top<br><b id="top">-</b></div>
</div>

<div id="insights"></div>

<div class="chartBox">
<canvas id="barChart"></canvas>
</div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
<table id="table" width="100%"></table>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
<div class="chartBox">
<canvas id="salesChart"></canvas>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="switchTab(1,this)" class="active">📊</div>
<div onclick="switchTab(2,this)">📦</div>
<div onclick="switchTab(3,this)">📈</div>
</div>

</div>

<!-- INSTALL BANNER -->
<div id="install">Install App</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

let RAW = {};
let barChart, salesChart;

/* LOGIN */
function login(){
  if(pass.value==="1234"){
    login.style.display="none";
    app.style.display="block";
    load();
  } else alert("Wrong");
}

/* LOAD */
async function load(){
  let res = await fetch(URL);
  let data = await res.text();
  RAW = JSON.parse(data);
  draw(RAW);
}

/* DRAW */
function draw(data){

  let pt={}, dt={}, total=0;
  let dates = Object.keys(data).sort();

  for(let d of dates){
    dt[d]=0;
    for(let p in data[d]){
      let v=+data[d][p]||0;
      pt[p]=(pt[p]||0)+v;
      dt[d]+=v;
      total+=v;
    }
  }

  let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
  let top5 = sorted.slice(0,5);

  sales.innerText="£"+total.toFixed(2);
  products.innerText=sorted.length;
  top.innerText=top5[0]||"-";

  insights.innerHTML =
    "🏆 Top Products<br>" +
    top5.map(p=>"• "+p+" (£"+pt[p].toFixed(2)+")").join("<br>");

  /* PRODUCT BAR */
  if(barChart) barChart.destroy();
  barChart = new Chart(barChartCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>data[d][p]||0),
        stack:"s"
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true}}}
  });

  /* SALES BAR */
  if(salesChart) salesChart.destroy();
  salesChart = new Chart(salesChartCanvas,{
    type:"bar",
    data:{
      labels:dates,
      datasets:[{
        label:"Sales (£)",
        data:dates.map(d=>dt[d]),
        backgroundColor:"#38bdf8"
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        tooltip:{callbacks:{label:c=>"£"+c.raw.toFixed(2)}}
      }
    }
  });

  table.innerHTML =
    sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");
}

/* TABS */
function switchTab(n,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* SWIPE */
let startX=0;

container.addEventListener("touchstart",e=>startX=e.touches[0].clientX);

container.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(diff>80) switchTab(1,document.querySelectorAll(".nav div")[0]);
  if(diff<-80) switchTab(3,document.querySelectorAll(".nav div")[2]);
});

/* PULL TO REFRESH */
let pulling=false;

container.addEventListener("touchmove",e=>{
  if(container.scrollTop===0 && e.touches[0].clientY>80){
    pull.innerText="↻ Release to refresh";
    pulling=true;
  }
});

container.addEventListener("touchend",()=>{
  if(pulling){
    load();
    pull.innerText="⬇ Pull to refresh";
  }
  pulling=false;
});

/* PWA INSTALL */
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  window.deferred=e;
  install.style.display="block";
});

install.onclick=()=>{
  window.deferred.prompt();
};

</script>

</body>
</html>
