<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   🌌 BASE
========================= */
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#111827,#0f172a);
  color:white;
  overflow:hidden;
}

/* =========================
   🔐 LOGIN
========================= */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
}

input,button{
  padding:12px;
  border-radius:12px;
  border:none;
}

input{
  background:#0b1220;
  color:white;
  outline:none;
}

button{
  background:linear-gradient(135deg,#38bdf8,#3b82f6);
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   📦 APP
========================= */
#app{
  display:none;
  height:100vh;
}

/* =========================
   🌊 TABS
========================= */
.tabs{
  display:flex;
  width:100%;
  height:calc(100vh - 70px);
  transition:transform .5s cubic-bezier(.2,.8,.2,1);
}

.tab{
  min-width:100%;
  padding:16px;
  overflow:auto;
  box-sizing:border-box;
}

/* =========================
   🧭 NAV
========================= */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  backdrop-filter:blur(12px);
  background:rgba(15,23,42,.7);
  border-top:1px solid rgba(255,255,255,.05);
}

.nav div{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:14px;
  opacity:.7;
  transition:.2s;
}

.nav div:hover{
  opacity:1;
}

.nav .active{
  opacity:1;
  color:#38bdf8;
}

/* =========================
   📊 CARDS
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:rgba(30,41,59,.6);
  backdrop-filter:blur(10px);
  padding:14px;
  border-radius:16px;
  transition:.2s;
  border:1px solid rgba(255,255,255,.05);
}

.card:hover{
  transform:translateY(-2px);
  border-color:#38bdf8;
}

/* =========================
   📅 DATES
========================= */
.dates{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.dates input{flex:1;}

/* =========================
   📈 CHARTS
========================= */
canvas{
  background:rgba(30,41,59,.4);
  border-radius:16px;
  margin-top:12px;
  padding:10px;
}

/* =========================
   📦 TABLE
========================= */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* =========================
   💬 TOP PRODUCTS
========================= */
#homeTopList div{
  padding:6px;
  border-radius:8px;
  transition:.2s;
  cursor:pointer;
}

#homeTopList div:hover{
  background:rgba(56,189,248,.1);
}

/* =========================
   ⏳ LOADING
========================= */
#loading{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:999;
}

/* =========================
   🍞 TOAST
========================= */
#toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  opacity:0;
  transition:.2s;
}
#toast.show{opacity:1;}

</style>
</head>

<body>

<div id="loading">Loading...</div>

<div id="login">
  <h2>Dashboard Login</h2>
  <input id="pass" type="password">
  <button onclick="App.login()">Enter</button>
</div>

<div id="app">

  <div class="tabs" id="tabs">

    <!-- HOME -->
    <div class="tab">

      <div class="grid">
        <div class="card">Sales<br><b id="sales">£0</b></div>
        <div class="card">Products<br><b id="products">0</b></div>
        <div class="card">Top<br><b id="top">-</b></div>
      </div>

      <div class="dates">
        <input id="startDate" type="date">
        <input id="endDate" type="date">
        <button onclick="App.applyRange()">Apply</button>
        <button onclick="App.setRange('today')">Today</button>
        <button onclick="App.setRange('7')">7D</button>
        <button onclick="App.setRange('30')">30D</button>
      </div>

      <div style="margin-top:12px;">
        <b>Top Products</b>
        <div id="homeTopList"></div>
      </div>

      <canvas id="barChart"></canvas>
    </div>

    <!-- STATS -->
    <div class="tab">
      <canvas id="salesChart"></canvas>
      <div id="insights"></div>
    </div>

    <!-- PRODUCTS -->
    <div class="tab">
      <table id="productTable"></table>
    </div>

  </div>
</div>

<div class="nav" id="nav">
  <div onclick="App.switchTab(0,this)" class="active">Home</div>
  <div onclick="App.switchTab(1,this)">Stats</div>
  <div onclick="App.switchTab(2,this)">Products</div>
</div>

<div id="toast"></div>

<script>

const App = (() => {

  const CONFIG = {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    PASSWORD: "1234"
  };

  const STATE = {
    raw: {},
    barChart: null,
    salesChart: null
  };

  const $ = id => document.getElementById(id);

  const animate = (el, value) => {
    if (!el) return;
    el.style.transform = "scale(1.05)";
    el.textContent = value;
    setTimeout(()=>el.style.transform="scale(1)",120);
  };

  const login = () => {
    if ($("pass").value !== CONFIG.PASSWORD) return;

    $("login").style.display = "none";
    $("app").style.display = "block";
    $("nav").style.display = "flex";

    load();
  };

  const load = async () => {
    $("loading").style.display = "flex";

    const res = await fetch(CONFIG.URL);
    const data = await res.json();

    STATE.raw = data;
    draw(data);

    $("loading").style.display = "none";
  };

  const setRange = (type) => {
    const now = new Date();
    let start = new Date();

    if (type === "today") start.setHours(0,0,0,0);
    if (type === "7") start.setDate(now.getDate()-7);
    if (type === "30") start.setDate(now.getDate()-30);

    $("startDate").value = start.toISOString().split("T")[0];
    $("endDate").value = now.toISOString().split("T")[0];

    applyRange();
  };

  const applyRange = () => {
    const s = new Date($("startDate").value + "T00:00:00").getTime();
    const e = new Date($("endDate").value + "T23:59:59").getTime();

    const out = {};

    for (const d in STATE.raw) {
      const t = new Date(d).getTime();
      if (t >= s && t <= e) out[d] = STATE.raw[d];
    }

    draw(out);
  };

  const draw = (data) => {

    let pt = {}, dt = {}, total = 0;
    const dates = Object.keys(data || {}).sort();

    for (const d of dates) {
      dt[d] = 0;
      for (const p in data[d]) {
        const v = Number(data[d][p] || 0);
        pt[p] = (pt[p] || 0) + v;
        dt[d] += v;
        total += v;
      }
    }

    const sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    const top5 = sorted.slice(0,5);

    animate($("sales"), "£"+total.toFixed(2));
    animate($("products"), sorted.length);
    animate($("top"), top5[0] || "-");

    $("homeTopList").innerHTML =
      top5.map((p,i)=>`<div>${i+1}. ${p} — £${pt[p].toFixed(2)}</div>`).join("");

    $("productTable").innerHTML =
      sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");

    if (STATE.barChart) STATE.barChart.destroy();

    STATE.barChart = new Chart($("barChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: top5.map(p => ({
          label: p,
          data: dates.map(d => data[d]?.[p] || 0),
          stack: "s"
        }))
      },
      options: {
        responsive:true,
        scales:{
          x:{stacked:true},
          y:{stacked:true}
        }
      }
    });

    if (STATE.salesChart) STATE.salesChart.destroy();

    STATE.salesChart = new Chart($("salesChart"), {
      type: "bar",
      data: {
        labels: dates,
        datasets: [{
          label:"Sales",
          data: dates.map(d=>dt[d]||0)
        }]
      }
    });

    $("insights").innerHTML =
      `<div style="margin-top:10px;padding:10px;background:#1e293b;border-radius:12px;">
        Avg Daily: £${(total/(dates.length||1)).toFixed(2)}
      </div>`;
  };

  const switchTab = (i,el) => {
    $("tabs").style.transform = `translateX(-${i*100}%)`;
    document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
  };

  return {login,setRange,applyRange,switchTab};

})();

window.App = App;

</script>

</body>
</html>
