<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:10;
}

.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

/* PULL TO REFRESH */
#pull{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  text-align:center;
  font-size:14px;
  color:#38bdf8;
  transition:top 0.2s;
}

/* OFFLINE */
#offline{
  display:none;
  text-align:center;
  padding:6px;
  background:#ef4444;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input,button{
  padding:10px;
  margin:5px;
}

/* APP */
.wrap{
  padding:10px;
}

/* TABS */
.tab{
  display:none;
}

.tab.active{
  display:block;
}

/* TILES */
.tiles{
  display:flex;
  gap:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  padding:10px;
  text-align:center;
}

.nav .active{
  background:#38bdf8;
}

/* TABLE */
table{
  width:100%;
}

td{
  padding:6px;
  border-bottom:1px solid #334155;
}

/* CHART */
.chartBox{
  width:100%;
  height:240px;
}

canvas{
  width:100% !important;
  height:240px !important;
}

</style>
</head>

<body>

<div id="splash"><div class="loader"></div></div>
<div id="pull">↓ Pull to refresh
