<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  z-index:10;
}

.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

/* ELASTIC PULL */
#pull{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  text-align:center;
  font-size:14px;
  color:#38bdf8;
  transition:top 0.2s;
}

/* OFFLINE */
#offline{
  display:none;
  text-align:center;
  padding:6px;
  background:#ef4444;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input,button{
  padding:10px;
  margin:5px;
}

/* APP */
.wrap{
  padding:10px;
}

/* TABS */
.tab{
  display:none;
}

.tab.active{
  display:block;
}

/* TILES */
.tiles{
  display:flex;
  gap:10px;
}

.tile{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e293b;
}

.nav div{
  flex:1;
  padding:10px;
  text-align:center;
}

.nav .active{
  background:#38bdf8;
}

/* TABLE */
table{
  width:100%;
}

td{
  padding:6px;
  border-bottom:1px solid #334155;
}

/* CHART */
.chartBox{
  width:100%;
  height:240px;
}

canvas{
  width:100% !important;
  height:240px !important;
}

</style>
</head>

<body>

<div id="splash"><div class="loader"></div></div>
<div id="pull">↓ Pull to refresh</div>
<div id="offline">Offline mode</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="wrap">

<input type="date" id="start">
<input type="date" id="end">
<button onclick="load()">Load</button>

<!-- TAB 1 -->
<div id="tab1" class="tab active">
  <div class="tiles">
    <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
    <div class="tile"><div>Products</div><div id="orders">0</div></div>
    <div class="tile"><div>Top</div><div id="top">-</div></div>
  </div>

  <div class="chartBox">
    <canvas id="barChart"></canvas>
  </div>
</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <div id="tableArea"></div>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="chartBox">
    <canvas id="lineChart"></canvas>
  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab(1,this)" class="active">📊</div>
  <div onclick="switchTab(2,this)">📦</div>
  <div onclick="switchTab(3,this)">📈</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec";

const salesEl = document.getElementById("sales");
const ordersEl = document.getElementById("orders");
const topEl = document.getElementById("top");
const tableArea = document.getElementById("tableArea");

const splash = document.getElementById("splash");
const login = document.getElementById("login");
const app = document.getElementById("app");
const offline = document.getElementById("offline");
const pull = document.getElementById("pull");

const pw = document.getElementById("pw");
const start = document.getElementById("start");
const end = document.getElementById("end");

let barChart, lineChart;
let currentTab = 1;

const PASSWORDS = ["1234","staff1","staff2"];

/* LOGIN */
function check(){
  if(PASSWORDS.includes(pw.value)){
    localStorage.setItem("login","1");
    showApp();
  } else alert("Wrong password");
}

function showApp(){
  login.style.display="none";
  app.style.display="block";
  load();
}

/* INIT */
window.onload=()=>{
  let today=new Date().toISOString().split("T")[0];
  start.value=today;
  end.value=today;

  if(localStorage.getItem("login")) showApp();

  setTimeout(()=>splash.style.display="none",500);
};

/* TAB SWITCH */
function switchTab(n,el){

  currentTab = n;

  document.querySelectorAll(".tab")
    .forEach(t=>t.classList.remove("active"));
  document.getElementById("tab"+n).classList.add("active");

  document.querySelectorAll(".nav div")
    .forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    if(barChart) barChart.resize();
    if(lineChart) lineChart.resize();
  },100);
}

/* LOAD */
async function load(){
  let url = SCRIPT_URL + "?start="+start.value+"&end="+end.value;

  try{
    let res = await fetch(url);
    let map = await res.json();
    localStorage.setItem("lastData",JSON.stringify(map));
    draw(map);
    offline.style.display="none";
  }catch{
    let saved = localStorage.getItem("lastData");
    if(saved) draw(JSON.parse(saved));
    offline.style.display="block";
  }
}

/* DRAW */
function draw(map){

  let productTotals = {};
  let dailyTotals = {};
  let dates = Object.keys(map).sort();
  let sales = 0;

  for(let d in map){
    dailyTotals[d]=0;
    for(let p in map[d]){
      let v = Number(map[d][p]) || 0;
      productTotals[p]=(productTotals[p]||0)+v;
      dailyTotals[d]+=v;
      sales+=v;
    }
  }

  let sorted = Object.keys(productTotals)
    .sort((a,b)=>productTotals[b]-productTotals[a]);

  let top5 = sorted.slice(0,5);

  salesEl.innerText="£"+sales.toFixed(2);
  ordersEl.innerText=sorted.length;
  topEl.innerText=top5[0]||"-";

  let labels = dates.map(d =>
    new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
  );

  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{
      labels:dates,
      datasets:top5.map(p=>({
        label:p,
        data:dates.map(d=>map[d][p]||0),
        stack:'s'
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true}}}
  });

  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById("lineChart"),{
    type:'line',
    data:{labels,datasets:[{label:"Sales",data:dates.map(d=>dailyTotals[d])}]},
    options:{responsive:true,maintainAspectRatio:false}
  });

  let html="<table>";
  sorted.forEach(p=>{
    html+=`<tr><td>${p}</td><td>£${productTotals[p].toFixed(2)}</td></tr>`;
  });
  html+="</table";

  tableArea.innerHTML=html;
}

/* =========================
   ELASTIC PULL + SWIPE
========================= */

let startX=0,startY=0;
let isScrolling=false,isPulling=false,isRefreshing=false;

function easePull(dy){
  return dy * 0.4; // elastic resistance
}

document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
  isScrolling=false;
  isPulling=false;
});

document.addEventListener("touchmove",e=>{

  if(isRefreshing) return;

  let dx=e.touches[0].clientX-startX;
  let dy=e.touches[0].clientY-startY;

  if(Math.abs(dy)>Math.abs(dx)){

    if(window.scrollY < 5 && dy > 20){
      isPulling=true;

      let y = easePull(dy);
      pull.style.top = Math.min(y - 60, 30) + "px";

    }else{
      isScrolling=true;
    }

  }
});

document.addEventListener("touchend",e=>{

  let diffX=startX-e.changedTouches[0].clientX;
  let diffY=startY-e.changedTouches[0].clientY;

  /* PULL */
  if(isPulling){

    pull.style.top="-60px";

    if(diffY < -100 && !isRefreshing){
      isRefreshing=true;
      pull.innerText="⟳ Refreshing...";
      load();

      setTimeout(()=>{
        pull.innerText="↓ Pull to refresh";
        isRefreshing=false;
      },1200);
    }

    return;
  }

  /* SWIPE */
  if(isScrolling || isRefreshing) return;

  if(Math.abs(diffX)<50) return;

  if(diffX>0 && currentTab<3){
    switchTab(currentTab+1);
  }else if(diffX<0 && currentTab>1){
    switchTab(currentTab-1);
  }

});

</script>

</body>
</html>
