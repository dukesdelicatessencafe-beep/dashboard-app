<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA / APP SETTINGS -->
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- APP ICONS / MANIFEST -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">

<!-- CHART LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Sales Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}
</style>

</head>

<body>

<div id="splash">Loading...</div>

<div id="offline">Offline mode</div>

<!-- LOGIN -->
<div id="login" style="text-align:center;margin-top:120px;">
  <h2>Login</h2>
  <input type="password" id="pw">
  <button onclick="check()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="wrap">

<input type="date" id="start">
<input type="date" id="end">

<div id="slider" class="slider">

<!-- DASHBOARD -->
<div class="section">
  <div class="tiles">
    <div class="tile"><div>Sales</div><div id="sales">£0</div></div>
    <div class="tile"><div>Orders</div><div id="orders">0</div></div>
    <div class="tile"><div>Top</div><div id="top">-</div></div>
  </div>
  <canvas id="barChart"></canvas>
</div>

<!-- PRODUCTS -->
<div class="section">
  <div id="tableArea"></div>
</div>

<!-- TRENDS -->
<div class="section">
  <canvas id="lineChart"></canvas>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goTo(0,this)" class="active">📊</div>
  <div onclick="goTo(1,this)">📦</div>
  <div onclick="goTo(2,this)">📈</div>
</div>

<script>

let index=0;
let startX=0;
let barChart,lineChart;

const PASSWORDS=["1234","staff1","staff2"];

/* LOGIN */
function check(){
  if(PASSWORDS.includes(pw.value)){
    localStorage.setItem("login","1");
    showApp();
  }else alert("Wrong password");
}

function showApp(){
  login.style.display="none";
  app.style.display="block";
  load();
}

/* INIT */
window.onload=()=>{
  let today=new Date().toISOString().split("T")[0];
  start.value=today;
  end.value=today;

  if(localStorage.getItem("login")) showApp();

  setTimeout(()=>splash.style.display="none",500);
};

/* DATE CHANGE */
start.onchange=load;
end.onchange=load;

/* NAV */
function goTo(i,el){
  index=i;
  slider.style.transform="translateX(-"+(i*100)+"%)";

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}

/* SWIPE */
slider.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

slider.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;

  if(diff>50 && index>0) index--;
  if(diff<-50 && index<2) index++;

  slider.style.transform="translateX(-"+(index*100)+"%)";

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  document.querySelectorAll(".nav div")[index].classList.add("active");
});

/* LOAD DATA */
async function load(){

  let url="https://script.google.com/macros/s/AKfycbxaNoSfFbXI_z1oVXCG4j9AtvNSuokJIQNX7YsDnCMF0Lk57AcAY3lv4gHfFUetgyDRZg/exec?start="+start.value+"&end="+end.value;

  try{
    let res=await fetch(url);
    let map=await res.json();

    localStorage.setItem("lastData",JSON.stringify(map));

    draw(map);
    showOnline(true);

  }catch{

    let saved=localStorage.getItem("lastData");
    if(saved) draw(JSON.parse(saved));

    showOnline(false);
  }
}

/* OFFLINE UI */
function showOnline(state){
  offline.style.display = state ? "none" : "block";
}

/* DRAW */
function draw(map){

  let totals={},daily={},dates=Object.keys(map).sort();
  let sales=0,orders=0;

  for(let d in map){
    daily[d]=0;
    for(let p in map[d]){
      let v=map[d][p];
      totals[p]=(totals[p]||0)+v;
      daily[d]+=v;
      sales+=v;
      orders++;
    }
  }

  let sorted=Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  let top5=sorted.slice(0,5);

  salesEl.innerText="£"+sales.toFixed(0);
  ordersEl.innerText=orders;
  topEl.innerText=top5[0]||"-";

  let labels=dates.map(d=>new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}));

  if(barChart) barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{labels,datasets:top5.map(p=>({label:p,data:dates.map(d=>map[d][p]||0)}))}
  });

  if(lineChart) lineChart.destroy();
  lineChart=new Chart(document.getElementById("lineChart"),{
    type:'line',
    data:{labels,datasets:[{label:"Sales",data:dates.map(d=>daily[d])}]}
  });

  let html="<table>";
  for(let p in totals){
    html+=`<tr><td>${p}</td><td>£${totals[p].toFixed(2)}</td></tr>`;
  }
  html+="</table>";

  tableArea.innerHTML=html;
}

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
