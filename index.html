<script>

const App = {

  /* STATE */
  state: {
    RAW: {},
    barChart: null,
    salesChart: null
  },

  /* CONFIG */
  config: {
    URL: "https://script.google.com/macros/s/AKfycbxo28u058nlkD54fAoabW7WfW0tGU3IRVsEcyOSMpnzLvvtJ0U0Wyzp_-tMytupm8JmiQ/exec",
    password: "1234"
  },

  /* UI ELEMENTS */
  ui: {},

  /* INIT */
  init(){
    this.cacheDOM();
    this.bindEvents();
  },

  /* CACHE DOM */
  cacheDOM(){
    this.ui = {
      login: document.getElementById("login"),
      app: document.getElementById("app"),
      pass: document.getElementById("pass"),
      container: document.getElementById("container"),

      sales: document.getElementById("sales"),
      products: document.getElementById("products"),
      top: document.getElementById("top"),
      insights: document.getElementById("insights"),
      table: document.getElementById("table"),

      startDate: document.getElementById("startDate"),
      endDate: document.getElementById("endDate"),

      barChart: document.getElementById("barChart"),
      salesChart: document.getElementById("salesChart")
    };
  },

  /* EVENTS */
  bindEvents(){

    /* LOGIN BUTTON */
    window.login = () => this.login();

    /* SWIPE + PULL */
    this.initGestures();
  },

  /* LOGIN */
  login(){

    if(this.ui.pass.value === this.config.password){
      this.ui.login.style.display = "none";
      this.ui.app.style.display = "block";
      this.load();
    } else {
      alert("Wrong password");
    }
  },

  /* API LOAD */
  async load(){

    try{
      const res = await fetch(this.config.URL);
      const text = await res.text();

      if(!text || text.includes("<!DOCTYPE")){
        throw new Error("Invalid API response");
      }

      this.state.RAW = JSON.parse(text);
      this.draw(this.state.RAW);

    } catch(e){
      console.error(e);
      alert("Load failed — API issue");
    }
  },

  /* DRAW */
  draw(data){

    let pt={}, dt={}, total=0;
    let dates = Object.keys(data||{}).sort();

    for(let d of dates){
      let day=data[d]||{};
      dt[d]=0;

      for(let p in day){
        let v=Number(day[p]||0);
        pt[p]=(pt[p]||0)+v;
        dt[d]+=v;
        total+=v;
      }
    }

    let sorted = Object.keys(pt).sort((a,b)=>pt[b]-pt[a]);
    let top5 = sorted.slice(0,5);

    this.ui.sales.innerText = "£"+total.toFixed(2);
    this.ui.products.innerText = sorted.length;
    this.ui.top.innerText = top5[0]||"-";

    /* AI INSIGHTS */
    let avg = total / (dates.length || 1);
    let anomalies = dates.filter(d=>dt[d] > avg*1.5);

    this.ui.insights.innerHTML =
      "🏆 Top Products<br>" +
      top5.map(p=>"• "+p+" (£"+pt[p].toFixed(2)+")").join("<br>") +
      "<br><br>⚠️ High Sales Days<br>" +
      (anomalies.length ? anomalies.join("<br>") : "None");

    /* CHARTS */
    if(this.state.barChart) this.state.barChart.destroy();

    this.state.barChart = new Chart(this.ui.barChart,{
      type:"bar",
      data:{
        labels:dates,
        datasets:top5.map(p=>({
          label:p,
          data:dates.map(d=>data[d]?.[p]||0),
          stack:"s"
        }))
      },
      options:{responsive:true,maintainAspectRatio:false}
    });

    if(this.state.salesChart) this.state.salesChart.destroy();

    this.state.salesChart = new Chart(this.ui.salesChart,{
      type:"bar",
      data:{
        labels:dates,
        datasets:[{
          label:"Sales (£)",
          data:dates.map(d=>dt[d]||0),
          backgroundColor:"#38bdf8"
        }]
      }
    });

    this.ui.table.innerHTML =
      sorted.map(p=>`<tr><td>${p}</td><td>£${pt[p].toFixed(2)}</td></tr>`).join("");
  },

  /* FILTER */
  applyFilter(){

    let s = new Date(this.ui.startDate.value).getTime();
    let e = new Date(this.ui.endDate.value).getTime();

    let out={};

    for(let d in this.state.RAW){
      let t = new Date(d).getTime();
      if(t>=s && t<=e) out[d]=this.state.RAW[d];
    }

    this.draw(out);
  },

  /* DATE PRESETS */
  setRange(type){

    let end = new Date();
    let start = new Date();

    if(type==="today") start.setHours(0,0,0,0);
    if(type==="7") start.setDate(end.getDate()-7);
    if(type==="30") start.setDate(end.getDate()-30);

    this.ui.startDate.value = start.toISOString().split("T")[0];
    this.ui.endDate.value = end.toISOString().split("T")[0];

    this.applyFilter();
  },

  /* TABS */
  switchTab(n,el){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.getElementById("tab"+n).classList.add("active");

    document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
  },

  /* GESTURES */
  initGestures(){

    const c = this.ui.container;
    if(!c) return;

    let startX=0, pulling=false;

    c.addEventListener("touchstart",e=>{
      startX=e.touches[0].clientX;
    });

    c.addEventListener("touchend",e=>{
      let diff=e.changedTouches[0].clientX-startX;

      if(diff>80) this.switchTab(1,document.querySelectorAll(".nav div")[0]);
      if(diff<-80) this.switchTab(3,document.querySelectorAll(".nav div")[2]);

      if(pulling){
        this.load();
        pulling=false;
      }
    });

    c.addEventListener("touchmove",e=>{
      if(c.scrollTop===0 && e.touches[0].clientY>80){
        pulling=true;
      }
    });
  }

};

/* INIT AFTER DOM READY */
document.addEventListener("DOMContentLoaded", () => {
  App.init();
});

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

</script>
